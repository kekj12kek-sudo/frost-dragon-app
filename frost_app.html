<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>突撃くん</title>
<style>
/* ============ 共通 ============ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{color:#e6edf3;font-family:'Hiragino Kana','Hiragino Sans','Yu Gothic',sans-serif;font-size:14px;overscroll-behavior:none}
body.mode-svs{background:#060d1a}
body.mode-frost{background:#060d1a}

/* SVS カラー */
.svs-mode{--bg:#060d1a;--bg2:#0d1829;--bg3:#142035;--bg4:#1c2e47;--border:#1c3050;--border2:#2a4570;--text:#e0eeff;--text2:#7a9cc0;--text3:#4a6a90;--accent:#38b6ff;--accent2:#0e8fd4;--green:#3fb950;--red:#f85149;--orange:#e3b341;--purple:#a371f7;--hi:#7dd3fc;}
/* 霜竜 カラー */
.frost-mode{--bg:#060d1a;--bg2:#0d1829;--bg3:#142035;--bg4:#1c2e47;--border:#1c3050;--border2:#2a4570;--text:#e0eeff;--text2:#7a9cc0;--text3:#4a6a90;--accent:#38b6ff;--accent2:#0e8fd4;--green:#3fb950;--red:#f85149;--orange:#e3b341;--purple:#a371f7;--hi:#7dd3fc;}

#app{max-width:480px;margin:0 auto;min-height:100vh;display:none;flex-direction:column;background:var(--bg)}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:15px;font-weight:700;color:var(--hi)}
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:50px;padding:10px 4px;text-align:center;font-size:11px;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{flex:1;padding:12px;overflow-y:auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.sec{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.btn{height:48px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:500;width:100%}
.btn:active{filter:brightness(0.82)}
.btn-primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn-success{background:#1a3a1f;border-color:var(--green);color:var(--green)}
.btn-danger{background:#3a1a1a;border-color:var(--red);color:var(--red)}
.btn-sm{height:36px;font-size:13px}
.btn-xs{height:30px;font-size:12px;padding:0 10px}
.inp{width:100%;height:40px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;padding:0 10px;outline:none}
.inp:focus{border-color:var(--accent)}
.inp-num{width:80px;height:36px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:15px;font-weight:700;text-align:center;padding:0 6px;outline:none;-webkit-appearance:none;}
.inp-num:focus{border-color:var(--accent)}
select.inp{cursor:pointer}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.p-off{background:#21262d;color:var(--text2)}.p-on{background:#1a3a1f;color:var(--green)}
.p-warn{background:#3a2a0a;color:var(--orange)}.p-low{background:#3a1a1a;color:var(--red)}
.p-dead{background:#21262d;color:var(--text3)}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg4);color:var(--text2)}
.chip[data-t="A"]{background:#1a2a3a;color:#58a6ff}.chip[data-t="B"]{background:#1a3a1a;color:var(--green)}
.chip[data-t="C"]{background:#3a2a0a;color:var(--orange)}.chip[data-t="D"]{background:#3a1a1a;color:var(--red)}
.chip[data-t="E"]{background:#2a1a3a;color:var(--purple)}
.chip[data-t="未"]{background:#21262d;color:var(--text3)}
.ptoggle{display:flex;background:var(--bg);border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:10px}
.pbtn{flex:1;padding:10px 8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);line-height:1.4}
.pbtn.on{background:var(--accent2);color:#fff}
.seg2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.sbtn{padding:10px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);border-radius:8px;border:1px solid var(--border2);background:var(--bg3)}
.sbtn.on-blue{background:#1a2a3a;border-color:var(--accent);color:var(--accent)}
.empty{text-align:center;padding:24px;color:var(--text3);font-size:13px}
.cpbox{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px;font-family:monospace;font-size:13px;white-space:pre;overflow-x:auto;color:var(--text);margin-bottom:8px;line-height:1.8}
.tgl{position:relative;width:48px;height:26px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tsl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bg4);border-radius:26px;transition:.2s}
.tsl:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:var(--text2);border-radius:50%;transition:.2s}
input:checked+.tsl{background:var(--green)}
input:checked+.tsl:before{transform:translateX(22px);background:#fff}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.mov-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:12px 12px 0 0;padding:16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;border-top:1px solid var(--border2)}
.row{display:flex;align-items:center;gap:8px}.fl1{flex:1}
.bsec{background:var(--bg3);border-radius:8px;padding:8px 10px;border-left:3px solid var(--purple);margin-bottom:8px}
.er{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border)}
.ptp{background:var(--bg3);border-radius:8px;padding:10px;margin-top:8px;border:1px solid var(--border2)}
.tinp{width:84px;height:36px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:15px;font-weight:700;text-align:center;padding:0 6px;outline:none}
.face-label{font-size:11px;font-weight:700;padding:4px 8px;border-radius:4px;margin-bottom:6px;display:inline-block}
.face1-label{background:#1a2a3a;color:var(--accent)}
.face2-label{background:#2a1a3a;color:var(--purple)}
.master-badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 8px;border-radius:999px;background:rgba(247,215,116,.14);border:1px solid rgba(247,215,116,.55);color:#f7d774;font-size:11px;font-weight:900;letter-spacing:.5px;text-shadow:0 0 8px rgba(0,0,0,.85);margin-top:3px}
</style>

    else FS.tab=t.dataset.tab;

function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
function cp(txt){navigator.clipboard.writeText(txt).then(()=>toast('コピーしました！')).catch(()=>toast('コピー失敗'));}
function tc(t){return{A:'#58a6ff',B:'#3fb950',C:'#e3b341',D:'#f85149',E:'#a371f7'}[t]||'#2f81f7';}
function escAttr(v){return String(v??'').replace(/[&\"<>]/g,c=>({'&':'&amp;','\"':'&quot;','<':'&lt;','>':'&gt;'}[c]||c));}

// ペット共通
function petSt(id,state){
  const pet=state.pet,petStart=state.petStart,now=state.now;
  if(!pet[id])return'off';
  const rem=120-(now-(petStart[id]||now))/60000;
  if(rem<=0)return'dead';if(rem<=10)return'low';if(rem<=30)return'warn';return'on';
}
function petLbl(id,state){
  if(!state.pet[id])return'⚪ 未使用';
  const rem=120-(state.now-(state.petStart[id]||state.now))/60000;
  if(rem<=0)return'⚫ 失効';
  const m=Math.floor(rem),s=Math.floor((rem-m)*60);
  return`${{on:'🟢',warn:'🟡',low:'🔴'}[petSt(id,state)]||'⚪'} ${m}:${String(s).padStart(2,'0')}`;
}
function fmtT(id,state){const t=new Date(state.petStart[id]||Date.now());return`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;}
function fmtE(id,state){const e=new Date((state.petStart[id]||Date.now())+7200000);return`${String(e.getHours()).padStart(2,'0')}:${String(e.getMinutes()).padStart(2,'0')}`;}

function sCityPos(faceKey){
  const p=faceKey==='A'?SS.placementA:SS.placementB;
  return FIXED_POS[`${SS.split}_${SS.faction}_${faceKey}_${p}`]||[];
}
function sMarchArr(faceKey){return(faceKey==='A'?SS.placementA:SS.placementB)==='6'?M6:M5;}
function sPetArr(faceKey){return(faceKey==='A'?SS.placementA:SS.placementB)==='6'?P6:P5;}
function sCityCount(faceKey){return parseInt(faceKey==='A'?SS.placementA:SS.placementB);}
function sTotalCities(){return sCityCount('A')+sCityCount('B');}
function sGetCityIdx(mid){for(const[k,v] of Object.entries(SS.cityAssign)){if(v===mid)return{face:k[0],idx:parseInt(k.slice(1))-1,key:k};}return null;}
function sGetMarch(mid){
  const info=sGetCityIdx(mid);if(!info)return null;
  const ms=sMarchArr(info.face),pm=sPetArr(info.face);
  const adj=SS.adjust[mid]||{march:0,petMarch:0};
  const hasPet=SS.pet[mid]&&petSt(mid,SS)!=='dead';
  return hasPet?(pm[info.idx]+(adj.petMarch||0)):(ms[info.idx]+(adj.march||0));
}
function sGetBaseMarch(mid){
  const info=sGetCityIdx(mid);if(!info)return null;
  return sMarchArr(info.face)[info.idx];
}
function sGetBasePetMarch(mid){
  const info=sGetCityIdx(mid);if(!info)return null;
  return sPetArr(info.face)[info.idx];
}
function sAdjust(mid,key,delta){
  if(!SS.adjust[mid])SS.adjust[mid]={march:0,petMarch:0};
  SS.adjust[mid][key]=(SS.adjust[mid][key]||0)+delta;
  render();
}
function sFaceLabel(faceKey){
  if(SS.split==='lr'){const side=SS.faction==='blue'?'左':'右';return faceKey==='A'?`${side}上エリア`:`${side}下エリア`;}
  else{const side=SS.faction==='blue'?'上':'下';return faceKey==='A'?`${side}左エリア`:`${side}右エリア`;}
}
function sFactionLabel(){
  if(SS.split==='lr')return SS.faction==='blue'?'左陣営（青）':'右陣営（赤）';
  return SS.faction==='blue'?'上陣営（青）':'下陣営（赤）';
}

function sCalcHits(mems){
  const wm=mems.map(m=>({...m,march:sGetMarch(m.id)})).filter(m=>m.march!==null);
  if(!wm.length)return[];
  const base=Math.min(...wm.map(m=>m.march));
  return wm.map(m=>{
    const diff=m.march-base;
    return{...m,wait:diff,countLabel:diff>0?String(diff):diff<0?`+${Math.abs(diff)}`:'0'};
  }).sort((a,b)=>b.wait-a.wait);
}

// ============================================================
// 霜竜 ロジック
// ============================================================
function fGetMarch(mid){
  const m=FS.members.find(m=>m.id===mid);if(!m)return null;
  if(FS.pet[mid]&&petSt(mid,FS)!=='dead'&&m.petMarch)return m.petMarch;
  return m.march||null;
}
function fGetBase(wm){
  // FS.baseIdが設定されていればその行軍時間を基準に、なければ最短
  if(FS.baseId){
    const bm=wm.find(m=>m.id===FS.baseId);
    if(bm)return{base:bm.march,baseMember:bm};
  }
  const minMarch=Math.min(...wm.map(m=>m.march));
  const bm=wm.find(m=>m.march===minMarch);
  return{base:minMarch,baseMember:bm};
}
function fCalcHits(mems){
  const wm=mems.map(m=>({...m,march:fGetMarch(m.id)})).filter(m=>m.march!==null&&m.march>0);
  if(!wm.length)return[];
  const{base,baseMember}=fGetBase(wm);
  return wm.map(m=>{
    const diff=m.march-base;
    // diff>0: 基準より長い → 先に出す → 正数カウント表示
    // diff<0: 基準より短い → 後から出す → +N表示
    // diff=0: 基準 → 0
    return{...m,wait:diff,countLabel:diff>0?String(diff):diff<0?`+${Math.abs(diff)}`:'0'};
  }).sort((a,b)=>b.wait-a.wait);
}

function sEnemyPetSt(e){
  if(!e.pet)return{active:false,cls:'p-off',label:'⚪ ペット未使用'};
  const start=e.petStart||Date.now();
  const rem=120-(Date.now()-start)/60000;
  if(rem<=0)return{active:false,cls:'p-dead',label:'⚫ ペット切れ'};
  const m=Math.floor(rem),sec=Math.floor((rem-m)*60);
  const time=`${m}:${String(sec).padStart(2,'0')}`;
  if(rem<=10)return{active:true,cls:'p-low',label:`🔴 残り ${time}`};
  if(rem<=30)return{active:true,cls:'p-warn',label:`🟡 残り ${time}`};
  return{active:true,cls:'p-on',label:`🟢 ペット中 ${time}`};
}

function fDelayHitLabel(i){return ['初撃','2発目','3発目','4発目'][i]||`${i+1}発目`;}
function fDelayTeamColor(team){return tc(team);}
function fDelayGetMembersForSlot(slotIndex){
  const ac=FS.members.filter(m=>FS.active.includes(m.id)&&fGetMarch(m.id));
  if(FS.delaySource==='custom'){
    const key=String(slotIndex+1);
    return ac.filter(m=>String(FS.delayAssign[m.id]||'未')===key);
  }
  const team=FS.delayOrder[slotIndex];
  return ac.filter(m=>m.team===team);
}
function fDelayOffsets(){
  const gaps=FS.delayGaps||[0,2,2,2];
  const offsets=[0,0,0,0];
  for(let i=1;i<4;i++)offsets[i]=offsets[i-1]+(parseInt(gaps[i]||0)||0);
  return offsets;
}
function fDelayRows(){
  const offsets=fDelayOffsets();
  const raw=[];
  for(let i=0;i<4;i++){
    const members=fDelayGetMembersForSlot(i);
    members.forEach(m=>{
      const march=fGetMarch(m.id);
      if(march)raw.push({slot:i,offset:offsets[i],gap:i===0?0:(parseInt((FS.delayGaps||[])[i]||0)||0),member:m,march,team:FS.delaySource==='same'?FS.delayOrder[i]:(m.team||'未')});
    });
  }
  if(!raw.length)return[];
  const minKey=Math.min(...raw.map(r=>r.march-r.offset));
  return raw.map(r=>({...r,count:(r.march-r.offset)-minKey})).sort((a,b)=>a.slot-b.slot||b.count-a.count||b.march-a.march);
}
function fSetDelaySource(v){FS.delaySource=v;render();}
function fSetDelayOrder(idx,val){FS.delayOrder[idx]=val;render();}
function fSetDelayGap(idx,val){FS.delayGaps[idx]=Math.max(0,Math.min(99,parseInt(val||0)||0));render();}
function fBumpDelayGap(idx,delta){
  const cur=Math.max(0,Math.min(99,parseInt((FS.delayGaps||[])[idx]||0)||0));
  FS.delayGaps[idx]=Math.max(0,Math.min(99,cur+delta));
  render();
}

function sendGameChat(mode,kind,label){
  const txt=buildGameChatText(kind).trim();

  setGameChatButtonsDisabled(true);
  toast(`${label} 送信中...`);
  postGameChatText(mode,kind,label,txt).then(r=>{
    if(r.ok)toast(`${label} 送信指示を送りました`);
    else throw new Error('bad response');
  }).catch(()=>{
    navigator.clipboard.writeText(txt).catch(()=>{});
    toast('Windowsツール未起動。内容をコピーしました');
  }).finally(()=>{
    setTimeout(()=>setGameChatButtonsDisabled(false),5000);

async function sendDelayGameChat(){
  const sendDetail=document.getElementById('delay-send-detail')?.checked;
  const sendCount=document.getElementById('delay-send-count')?.checked;
  const jobs=[];
  if(sendDetail){
    const t=buildGameChatText('delayDetail').trim();
    if(t)jobs.push({kind:'delayDetail',label:'ディレイチーム詳細',text:t});
  }
  if(sendCount){
    const t1=buildGameChatText('delayCount01').trim();
    const t2=buildGameChatText('delayCount23').trim();
    if(t1)jobs.push({kind:'delayCount01',label:'ディレイ集結カウント前半',text:t1});
    if(t2)jobs.push({kind:'delayCount23',label:'ディレイ集結カウント後半',text:t2});
  }
  if(!jobs.length){toast('ディレイ送信内容がありません');return;}
  setGameChatButtonsDisabled(true);
  try{
    for(let i=0;i<jobs.length;i++){
      const j=jobs[i];
      toast(`${j.label} 送信中...`);
      const r=await postGameChatText('frost',j.kind,j.label,j.text);
      if(!r.ok)throw new Error('bad response');
      if(i<jobs.length-1)await sleep(5200);
    }
    toast('ディレイ送信完了');
  }catch(e){
    navigator.clipboard.writeText(jobs.map(j=>j.text).join('\n\n')).catch(()=>{});
    toast('Windowsツール未起動。内容をコピーしました');
  }finally{
    setTimeout(()=>setGameChatButtonsDisabled(false),5000);
  }
}

    const ac=SS.members.filter(m=>SS.active.includes(m.id));
    const teams=[...new Set(ac.map(m=>m.team))].sort();
    txt=teams.map(t=>{const tr=sCalcHits(ac.filter(m=>m.team===t));if(!tr.length)return null;return tr.map((r,i)=>i===0?`**【${t}】**${r.name} ${r.wait}秒後`:`${r.name} ${r.wait}秒後`).join('\n');}).filter(Boolean).join('\n');

function getStatePayload(){
  return {
    version:1,
    updatedAt:Date.now(),
    svs:{
      split:SS.split,faction:SS.faction,placementA:SS.placementA,placementB:SS.placementB,
      members:SS.members,cityAssign:SS.cityAssign,active:SS.active,pet:SS.pet,petStart:SS.petStart,enemies:SS.enemies,adjust:SS.adjust
    },
    frost:{
      members:FS.members,active:FS.active,pet:FS.pet,petStart:FS.petStart,enemies:FS.enemies,baseId:FS.baseId,calcMode:FS.calcMode,delaySource:FS.delaySource,delayOrder:FS.delayOrder,delayGaps:FS.delayGaps,delayAssign:FS.delayAssign,delayCopyMode:FS.delayCopyMode
    }
  };
}
function applyStatePayload(d){
  if(!d)return;
  const s=d.svs||d.SS||{};
  if(s.split)SS.split=s.split;if(s.faction)SS.faction=s.faction;
  if(s.placementA)SS.placementA=s.placementA;if(s.placementB)SS.placementB=s.placementB;
  if(s.members)SS.members=s.members;if(s.cityAssign)SS.cityAssign=s.cityAssign;
  if(s.active)SS.active=s.active;if(s.pet)SS.pet=s.pet;if(s.petStart)SS.petStart=s.petStart;
  if(s.enemies)SS.enemies=s.enemies;if(s.adjust)SS.adjust=s.adjust;
  const f=d.frost||d.FS||{};
  if(f.members)FS.members=f.members;if(f.active)FS.active=f.active;
  if(f.pet)FS.pet=f.pet;if(f.petStart)FS.petStart=f.petStart;if(f.enemies)FS.enemies=f.enemies;
  if(f.baseId!==undefined)FS.baseId=f.baseId;
  if(f.calcMode)FS.calcMode=f.calcMode;if(f.delaySource)FS.delaySource=f.delaySource;
  if(f.delayOrder)FS.delayOrder=f.delayOrder;if(f.delayGaps)FS.delayGaps=f.delayGaps;if(f.delayAssign)FS.delayAssign=f.delayAssign;if(f.delayCopyMode)FS.delayCopyMode=f.delayCopyMode;
}
function saveLocal(){
  try{localStorage.setItem('app_svs',JSON.stringify({
    split:SS.split,faction:SS.faction,placementA:SS.placementA,placementB:SS.placementB,
    members:SS.members,cityAssign:SS.cityAssign,active:SS.active,pet:SS.pet,petStart:SS.petStart,enemies:SS.enemies,adjust:SS.adjust
  }));

  }));}catch(e){}
}
function saveAll(){
  saveLocal();
  if(isRemoteApplying)return;
  if(fbDb&&roomRef&&roomKey){
    clearTimeout(fbSaveTimer);
    fbSaveTimer=setTimeout(()=>{
      if(isRemoteApplying)return;
      try{roomRef.set(getStatePayload()).catch(()=>{});}catch(e){}
    },250);

}
function loadAll(){
  try{
    const s=JSON.parse(localStorage.getItem('app_svs')||'{}');
    if(s.split)SS.split=s.split;if(s.faction)SS.faction=s.faction;
    if(s.placementA)SS.placementA=s.placementA;if(s.placementB)SS.placementB=s.placementB;
    if(s.members)SS.members=s.members;if(s.cityAssign)SS.cityAssign=s.cityAssign;

    if(s.enemies)SS.enemies=s.enemies;if(s.adjust)SS.adjust=s.adjust;
  }catch(e){}
  try{
    const f=JSON.parse(localStorage.getItem('app_frost')||'{}');
    if(f.members)FS.members=f.members;if(f.active)FS.active=f.active;
    if(f.pet)FS.pet=f.pet;if(f.petStart)FS.petStart=f.petStart;if(f.enemies)FS.enemies=f.enemies;if(f.baseId!==undefined)FS.baseId=f.baseId;
  if(f.calcMode)FS.calcMode=f.calcMode;if(f.delaySource)FS.delaySource=f.delaySource;
  if(f.delayOrder)FS.delayOrder=f.delayOrder;if(f.delayGaps)FS.delayGaps=f.delayGaps;if(f.delayAssign)FS.delayAssign=f.delayAssign;if(f.delayCopyMode)FS.delayCopyMode=f.delayCopyMode;
  }catch(e){}
}
function normalizeRoomKey(v){return String(v||'').replace(/\D/g,'').slice(0,4);}
function roomPath(mode,key){return `rooms/${mode}/${key}`;}
function connectRoom(mode,key){
  roomKey=normalizeRoomKey(key);
  roomMode=mode;
  if(roomKey){
    sessionStorage.setItem(`room_${mode}`,roomKey);
    sessionStorage.setItem('last_room_key',roomKey);
  }else{
    sessionStorage.removeItem(`room_${mode}`);
  }
  try{if(roomRef)roomRef.off();}catch(e){}
  roomRef=null;
  if(!fbDb||!roomKey){fetchMembers();return;}
  roomRef=fbDb.ref(roomPath(mode,roomKey));
  let first=true;
  roomRef.on('value',snap=>{
    const data=snap.val();
    if(first){
      first=false;
      if(data){
        roomHasRemoteData=true;
        isRemoteApplying=true;
        applyStatePayload(data);
        saveLocal();
        render();
        isRemoteApplying=false;
      }else{
        roomHasRemoteData=false;
        fetchMembers();
      }
      return;
    }
    if(!data)return;
    isRemoteApplying=true;
    applyStatePayload(data);
    saveLocal();
    render();
    isRemoteApplying=false;
  },err=>{console.warn('Firebase room error',err);toast('共有接続エラー');});
}

function fetchMembers(){
  fetch(GAS_URL).then(r=>r.json()).then(data=>{
    if(!data.members||!data.members.length)return;
    // SVS・霜竜 両方に同じメンバーを反映
    const syncMembers=(state,isFrost)=>{
      const old=state.members;
      state.members=data.members.map((m,i)=>{
        const o=old.find(o=>o.name===m.name);
        const base={id:o?.id||(Date.now()+i),name:m.name,team:o?.team||(m.team||'A')};
        return isFrost?{...base,march:o?.march||null,petMarch:o?.petMarch||null}:base;
      });
    };
    syncMembers(SS,false);syncMembers(FS,true);
    saveAll();render();
  }).catch(()=>{});
}

  const theme=MODE_THEME[toMode]||MODE_THEME.svs;

  vwrap.className='entrance-layer';
  vwrap.style.cssText='position:fixed;inset:0;width:100vw;height:100vh;background:#000;z-index:50;';
  const vid=document.createElement('video');
  vid.src=theme.switchVideo;
  vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
  vid.playsInline=true;vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');vid.muted=false;
  const goAuth=()=>{
    vwrap.style.transition='opacity 0.35s';
    vwrap.style.opacity='0';
    setTimeout(()=>{vwrap.remove();showAuth(toMode);},350);
  };
  vid.onended=goAuth;vid.onerror=goAuth;
  vwrap.appendChild(vid);document.body.appendChild(vwrap);
  vid.play().catch(goAuth);
}

function startVideo(mode){
  const val=document.getElementById('pw-input')?.value?.trim();
  const rk=normalizeRoomKey(document.getElementById('room-input')?.value?.trim());
  const normalPass=getPass();
  const masterPass='#'+getPass();
  const masterLogin=val===masterPass;
  if(val!==normalPass && !masterLogin){
    const err=document.getElementById('pw-err');if(err)err.textContent='パスワードが違います';
    const inp=document.getElementById('pw-input');if(inp){inp.style.borderColor='#f85149';setTimeout(()=>{inp.style.borderColor=mode==='svs'?'#ff8a00':'#38b6ff';},1000);inp.value='';inp.focus();}
    return;
  }
  sessionStorage.setItem(`auth_${mode}`,'ok');
  if(masterLogin)sessionStorage.setItem(`master_${mode}`,'1');
  else sessionStorage.removeItem(`master_${mode}`);
  IS_MASTER=masterLogin;
  document.getElementById('auth-screen')?.remove();document.getElementById('auth-bg')?.remove();document.getElementById('auth-bg-vid')?.remove();document.getElementById('auth-title-label')?.remove();
  const videoUrl=mode==='svs'?REPO_FROST+'intro.mp4':REPO_FROST+'frost_intro.mp4';
  const vwrap=document.createElement('div');
  vwrap.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:20;';
  const vid=document.createElement('video');
  vid.src=videoUrl;
  vid.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
  vid.playsInline=true;vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');vid.muted=false;
  const goMain=()=>{
    vwrap.style.transition='opacity 0.5s';vwrap.style.opacity='0';
    setTimeout(()=>{
      vwrap.remove();
      document.getElementById('app').style.display='flex';
      document.getElementById('app').style.opacity='0';
      document.getElementById('app').style.transition='opacity 0.4s';
      setTimeout(()=>{document.getElementById('app').style.opacity='1';},30);
      setMode(mode);connectRoom(mode,rk);
    },500);
  };
  vid.onended=goMain;vid.onerror=goMain;
  vwrap.appendChild(vid);document.body.appendChild(vwrap);
  vid.play().catch(goMain);
}

// ============================================================
// 初期化
// ============================================================
const _r=render;
window.render=function(){_r();saveAll();};

setInterval(()=>{
  const e=document.getElementById('hdr-clock');
  if(e)e.textContent=`🕒 ${formatClock()}`;
},1000);

setInterval(()=>{
  SS.now=Date.now();FS.now=Date.now();
  if(SS.members.some(m=>SS.active.includes(m.id)&&SS.pet[m.id])||FS.members.some(m=>FS.active.includes(m.id)&&FS.pet[m.id])||SS.enemies.some(e=>e.pet))render();
},10000);

loadAll();

// 前回のセッションがあればそのモードで再開、なければモード選択画面
const lastMode=sessionStorage.getItem('last_mode');
const lastRoom=lastMode?(sessionStorage.getItem(`room_${lastMode}`)||sessionStorage.getItem('last_room_key')||''):'';
if(lastMode&&checkAuth(lastMode)){
  document.getElementById('app').style.display='flex';
  setMode(lastMode);
  if(lastRoom)connectRoom(lastMode,lastRoom);
  else fetchMembers();
} else {
  showModeSelect();
}

// モード設定時にセッションに記録
const _setMode=setMode;
window.setMode=function(m){sessionStorage.setItem('last_mode',m);_setMode(m);};
</script>
