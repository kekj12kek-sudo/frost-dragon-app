<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>突撃くん</title>
<style>
/* ===== 共通 ===== */
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#2f81f7;--accent2:#1f6feb;
  --green:#3fb950;--red:#f85149;--orange:#e3b341;--purple:#a371f7;
  --ice:#7dd3fc;--ice2:#38b6ff;
  --btn-h:48px;--radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kana','Hiragino Sans','Yu Gothic',sans-serif;font-size:14px;overscroll-behavior:none}

/* ===== モード別テーマ ===== */
body.mode-frost{
  --bg:#060d1a;--bg2:#0d1829;--bg3:#142035;--bg4:#1c2e47;
  --border:#1c3050;--border2:#2a4570;
  --text:#e0eeff;--text2:#7a9cc0;--text3:#4a6a90;
  --accent:#38b6ff;--accent2:#0e8fd4;
}

#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:15px;font-weight:700;color:var(--accent)}
.mode-frost .header-title{color:var(--ice)}
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:55px;padding:10px 4px;text-align:center;font-size:11px;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mode-frost .tab.active{color:var(--ice);border-bottom-color:var(--ice)}
.content{flex:1;padding:12px;overflow-y:auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:10px}
.sec{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.btn{height:var(--btn-h);border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:500;width:100%}
.btn:active{filter:brightness(0.82)}
.btn-primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn-success{background:#1a3a1f;border-color:var(--green);color:var(--green)}
.btn-danger{background:#3a1a1a;border-color:var(--red);color:var(--red)}
.btn-warn{background:#3a2800;border-color:var(--orange);color:var(--orange)}
.btn-ice{background:#0a1e2e;border-color:var(--ice);color:var(--ice)}
.btn-sm{height:36px;font-size:13px}
.btn-xs{height:30px;font-size:12px;padding:0 10px}
.inp{width:100%;height:40px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:14px;padding:0 10px;outline:none}
.inp:focus{border-color:var(--accent)}
.mode-frost .inp:focus{border-color:var(--ice)}
.inp-num{width:70px;height:36px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:15px;font-weight:700;text-align:center;padding:0 6px;outline:none;-webkit-appearance:none;}
select.inp{cursor:pointer}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.p-off{background:#21262d;color:var(--text2)}.p-on{background:#1a3a1f;color:var(--green)}
.p-warn{background:#3a2a0a;color:var(--orange)}.p-low{background:#3a1a1a;color:var(--red)}
.p-dead{background:#21262d;color:var(--text3)}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg4);color:var(--text2)}
.chip[data-t="A"]{background:#1a2a3a;color:#58a6ff}.chip[data-t="B"]{background:#1a3a1a;color:var(--green)}
.chip[data-t="C"]{background:#3a2a0a;color:var(--orange)}.chip[data-t="D"]{background:#3a1a1a;color:var(--red)}
.chip[data-t="E"]{background:#2a1a3a;color:var(--purple)}
.seg2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.sbtn{padding:10px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg3)}
.sbtn.on-blue{background:#1a2a3a;border-color:var(--accent);color:var(--accent)}
.sbtn.on-red{background:#3a1a1a;border-color:var(--red);color:var(--red)}
.sbtn.on{background:var(--accent2);border-color:var(--accent);color:#fff}
.empty{text-align:center;padding:24px;color:var(--text3);font-size:13px}
.cpbox{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:10px;font-family:monospace;font-size:13px;white-space:pre;overflow-x:auto;color:var(--text);margin-bottom:8px;line-height:1.8}
.tgl{position:relative;width:48px;height:26px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tsl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bg4);border-radius:26px;transition:.2s}
.tsl:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:var(--text2);border-radius:50%;transition:.2s}
input:checked+.tsl{background:var(--green)}
input:checked+.tsl:before{transform:translateX(22px);background:#fff}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.mov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;border-top:1px solid var(--border2)}
.map-wrap{position:relative;width:100%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border2)}
.map-wrap img{width:100%;display:block;pointer-events:none;user-select:none}
.city-dot{position:absolute;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.7);background:rgba(0,0,0,0.45);cursor:pointer;touch-action:none;display:flex;align-items:center;justify-content:center;}
.city-dot.asgn{border-color:var(--accent);background:rgba(31,111,235,0.55)}
.city-dot.face2{border-color:var(--purple);background:rgba(163,113,247,0.35)}
.city-dot.face2.asgn{border-color:var(--purple);background:rgba(163,113,247,0.6)}
.ptp{background:var(--bg3);border-radius:var(--radius);padding:10px;margin-top:8px;border:1px solid var(--border2)}
.tinp{width:84px;height:36px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:15px;font-weight:700;text-align:center;padding:0 6px;outline:none}
.row{display:flex;align-items:center;gap:8px}.fl1{flex:1}
.bsec{background:var(--bg3);border-radius:var(--radius);padding:8px 10px;border-left:3px solid var(--purple);margin-bottom:8px}
.er{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border)}
.face-label{font-size:11px;font-weight:700;padding:4px 8px;border-radius:4px;margin-bottom:6px;display:inline-block}
.face1-label{background:#1a2a3a;color:var(--accent)}
.face2-label{background:#2a1a3a;color:var(--purple)}
</style>
</head>
<body>
<div id="app" style="display:none">
  <div class="header">
    <div>
      <div class="header-title" id="app-title">突撃くん</div>
      <div style="font-size:11px;color:var(--text3)" id="hdr-sub">読み込み中...</div>
    </div>
    <div style="font-size:11px;text-align:right;color:var(--text2);white-space:pre-line" id="hdr-info"></div>
  </div>
  <div class="tab-bar" id="tabs"></div>
  <div class="content" id="content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 統合版 突撃くん
// MODE: 'svs' or 'frost'
// ============================================================
const FROST_REPO='https://kekj12kek-sudo.github.io/frost-dragon-app/';
const GAS_URL='https://script.google.com/macros/s/AKfycbyES7vlaVErWjcK7WAmcM4cHg1s6EL1kQIxsuELXLmf8GbGNLGfnel_Mp-Qg33BKDb8iQ/exec';
const TEAMS=['A','B','C','D','E'];

// ===== SVS定数 =====
const M6=[43,39,36,36,39,43],M5=[40,37,36,37,40];
const P6=[37,33,30,30,33,37],P5=[34,31,30,31,34];
const FIXED_POS={
  'lr_blue_A_6':[{"x":72.6,"y":23.08},{"x":61.25,"y":33.68},{"x":49.83,"y":44.73},{"x":37.81,"y":56.49},{"x":25.33,"y":68.82},{"x":11.47,"y":81.88}],
  'lr_blue_B_6':[{"x":15.29,"y":31.52},{"x":28.61,"y":41.73},{"x":40.47,"y":51.04},{"x":53.1,"y":60.18},{"x":66.43,"y":70.24},{"x":79.06,"y":80.57}],
  'lr_blue_A_5':[{"x":67.12,"y":28.87},{"x":55.37,"y":39.5},{"x":43.4,"y":50.45},{"x":30.52,"y":62.79},{"x":18.1,"y":74.58}],
  'lr_blue_B_5':[{"x":21.68,"y":36.34},{"x":33.91,"y":46.39},{"x":47.29,"y":55.93},{"x":60.43,"y":65.52},{"x":72.9,"y":75.6}],
  'lr_red_A_6':[{"x":31.04,"y":29.11},{"x":40.94,"y":36.94},{"x":51.2,"y":45.14},{"x":61.32,"y":52.54},{"x":71.9,"y":59.37},{"x":82.71,"y":67.56}],
  'lr_red_B_6':[{"x":81.27,"y":24},{"x":71.07,"y":32.55},{"x":62.62,"y":39.96},{"x":53.11,"y":47.32},{"x":42.68,"y":54.77},{"x":32.71,"y":62.59}],
  'lr_red_A_5':[{"x":34.69,"y":34.05},{"x":46.01,"y":41.34},{"x":55.96,"y":48.62},{"x":66.37,"y":56.13},{"x":78.15,"y":63.64}],
  'lr_red_B_5':[{"x":76.47,"y":28.6},{"x":66.56,"y":36.91},{"x":56.65,"y":43.94},{"x":47.19,"y":51.74},{"x":37.05,"y":59.54}],
  'ud_blue_A_6':[{"x":11.82,"y":80.8},{"x":24.54,"y":68.91},{"x":37.36,"y":56.24},{"x":49.41,"y":44.55},{"x":61.89,"y":33.42},{"x":73.13,"y":22.61}],
  'ud_blue_B_6':[{"x":27.17,"y":20.8},{"x":36.68,"y":30.77},{"x":47.67,"y":39.32},{"x":57.9,"y":48.77},{"x":69.01,"y":58.17},{"x":81.4,"y":68.22}],
  'ud_blue_A_5':[{"x":18.45,"y":75.35},{"x":31.01,"y":62.59},{"x":43.98,"y":50.78},{"x":55.95,"y":39.12},{"x":67.83,"y":29.25}],
  'ud_blue_B_5':[{"x":33.11,"y":24.84},{"x":42.25,"y":35.31},{"x":53.39,"y":44.77},{"x":64.67,"y":53.63},{"x":76.1,"y":64.18}],
  'ud_red_A_6':[{"x":15.71,"y":30.83},{"x":29.1,"y":41.31},{"x":41.23,"y":51.03},{"x":53.51,"y":60.25},{"x":66.22,"y":70.2},{"x":79.07,"y":79.92}],
  'ud_red_B_6':[{"x":32.65,"y":63.41},{"x":43.3,"y":54.97},{"x":53.15,"y":47.03},{"x":61.78,"y":39.65},{"x":71.75,"y":31.82},{"x":81.4,"y":24.24}],
  'ud_red_A_5':[{"x":22.33,"y":36.81},{"x":34.44,"y":46.54},{"x":46.95,"y":56.02},{"x":59.6,"y":65.97},{"x":73.08,"y":75.18}],
  'ud_red_B_5':[{"x":37.21,"y":58.83},{"x":47.27,"y":51.9},{"x":57.04,"y":43.96},{"x":67.18,"y":36.38},{"x":76.32,"y":28.82}],
};
const IMG={
  lr_blue_A:FROST_REPO+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_54_40.png',
  lr_blue_B:FROST_REPO+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_54_56.png',
  lr_red_A: FROST_REPO+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_55_08.png',
  lr_red_B: FROST_REPO+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_55_12.png',
  ud_blue_A:FROST_REPO+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_54_40.png',
  ud_blue_B:FROST_REPO+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2023_48_15.png',
  ud_red_A: FROST_REPO+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2023_47_59.png',
  ud_red_B: FROST_REPO+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_55_12.png',
};

// ============================================================
// GLOBAL STATE
// ============================================================
let MODE='svs'; // 'svs' or 'frost'

// SVS STATE
const SVS={
  tab:'battle', split:'lr', faction:'blue', placementA:'6', placementB:'6',
  members:[], cityAssign:{}, active:[], pet:{}, petStart:{}, enemies:[],
  modal:null, selCity:null, now:Date.now(),
};

// FROST STATE
const FROST={
  tab:'battle',
  members:[], active:[], pet:{}, petStart:{}, enemies:[],
  now:Date.now(),
};

// ============================================================
// 共通ユーティリティ
// ============================================================
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
function cp(txt){navigator.clipboard.writeText(txt).then(()=>toast('コピーしました！')).catch(()=>toast('コピー失敗'));}
function tc(t){return{A:'#58a6ff',B:'#3fb950',C:'#e3b341',D:'#f85149',E:'#a371f7'}[t]||'#2f81f7';}
function fmtT(id,petStart){const t=new Date(petStart[id]||Date.now());return`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;}
function fmtE(id,petStart){const e=new Date((petStart[id]||Date.now())+7200000);return`${String(e.getHours()).padStart(2,'0')}:${String(e.getMinutes()).padStart(2,'0')}`;}

function petSt(id, petObj, petStartObj, now){
  if(!petObj[id])return'off';
  const rem=120-(now-(petStartObj[id]||now))/60000;
  if(rem<=0)return'dead';if(rem<=10)return'low';if(rem<=30)return'warn';return'on';
}
function petLbl(id, petObj, petStartObj, now){
  if(!petObj[id])return'⚪ 未使用';
  const rem=120-(now-(petStartObj[id]||now))/60000;
  if(rem<=0)return'⚫ 失効';
  const m=Math.floor(rem),s=Math.floor((rem-m)*60);
  return`${{on:'🟢',warn:'🟡',low:'🔴'}[petSt(id,petObj,petStartObj,now)]||'⚪'} ${m}:${String(s).padStart(2,'0')}`;
}

// ペットUI共通
function petRow(mid, petObj, petStartObj, now, toggleFn, setPetTFn, setPetNFn){
  const st=petSt(mid,petObj,petStartObj,now);
  const pc={off:'p-off',on:'p-on',warn:'p-warn',low:'p-low',dead:'p-dead'}[st];
  return`<div class="row" style="margin-bottom:${petObj[mid]?'6':'0'}px">
    <span class="tag ${pc}">${petLbl(mid,petObj,petStartObj,now)}</span>
    <button class="btn btn-xs" style="width:74px" onclick="${toggleFn}(${mid})">${petObj[mid]?'停止':'ペットON'}</button>
  </div>
  ${petObj[mid]?`<div class="ptp">
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px">ペット開始時刻（押し忘れ補正）</div>
    <div class="row" style="margin-bottom:4px">
      <input class="tinp" type="time" value="${fmtT(mid,petStartObj)}" onchange="${setPetTFn}(${mid},this.value)"/>
      <button class="btn btn-xs" style="width:64px" onclick="${setPetNFn}(${mid})">今すぐ</button>
      <span style="font-size:11px;color:var(--text2)">から2時間</span>
    </div>
    <div style="font-size:12px;color:var(--text3)">期限: ${fmtE(mid,petStartObj)}</div>
  </div>`:''}`;
}

// ============================================================
// SVS 関数群
// ============================================================
function svsFactionLabel(){
  if(SVS.split==='lr')return SVS.faction==='blue'?'左陣営（青）':'右陣営（赤）';
  return SVS.faction==='blue'?'上陣営（青）':'下陣営（赤）';
}
function svsFaceLabel(faceKey){
  if(SVS.split==='lr'){const s=SVS.faction==='blue'?'左':'右';return faceKey==='A'?`${s}上エリア`:`${s}下エリア`;}
  const s=SVS.faction==='blue'?'上':'下';return faceKey==='A'?`${s}左エリア`:`${s}右エリア`;
}
function svsPosKey(faceKey,placement){return`${SVS.split}_${SVS.faction}_${faceKey}_${placement}`;}
function svsGetCityPos(faceKey){const p=faceKey==='A'?SVS.placementA:SVS.placementB;return FIXED_POS[svsPosKey(faceKey,p)]||[];}
function svsMarchList(faceKey){return(faceKey==='A'?SVS.placementA:SVS.placementB)==='6'?M6:M5;}
function svsPetMarchList(faceKey){return(faceKey==='A'?SVS.placementA:SVS.placementB)==='6'?P6:P5;}
function svsCityCount(faceKey){return parseInt(faceKey==='A'?SVS.placementA:SVS.placementB);}
function svsTotalCities(){return svsCityCount('A')+svsCityCount('B');}
function svsGetMemberCityInfo(mid){
  for(const[k,v] of Object.entries(SVS.cityAssign)){if(v===mid){const face=k[0];const idx=parseInt(k.slice(1))-1;return{face,idx,key:k};}}
  return null;
}
function svsGetMemberMarch(mid){
  const info=svsGetMemberCityInfo(mid);if(!info)return null;
  const ms=svsMarchList(info.face),pm=svsPetMarchList(info.face);
  return(SVS.pet[mid]&&petSt(mid,SVS.pet,SVS.petStart,SVS.now)!=='dead')?pm[info.idx]:ms[info.idx];
}
function svsCalcHits(mems){
  const wm=mems.map(m=>({...m,march:svsGetMemberMarch(m.id)})).filter(m=>m.march!==null);
  if(!wm.length)return[];
  const base=Math.min(...wm.map(m=>m.march));
  return wm.map(m=>({...m,wait:m.march-base})).sort((a,b)=>b.wait-a.wait);
}
function svsGetMapImg(faceKey){return IMG[`${SVS.split}_${SVS.faction}_${faceKey}`]||'';}

// ============================================================
// FROST 関数群
// ============================================================
function frostGetEffectiveMarch(mid){
  const m=FROST.members.find(m=>m.id===mid);if(!m)return null;
  if(FROST.pet[mid]&&petSt(mid,FROST.pet,FROST.petStart,FROST.now)!=='dead'&&m.petMarch)return m.petMarch;
  return m.march||null;
}
function frostCalcHits(mems){
  const wm=mems.map(m=>({...m,march:frostGetEffectiveMarch(m.id)})).filter(m=>m.march!==null&&m.march>0);
  if(!wm.length)return[];
  const base=Math.min(...wm.map(m=>m.march));
  return wm.map(m=>({...m,wait:m.march-base})).sort((a,b)=>b.wait-a.wait);
}

// ============================================================
// メインrender
// ============================================================
function render(){
  const isSVS=MODE==='svs';
  document.body.className=isSVS?'':'mode-frost';
  document.getElementById('app-title').textContent=isSVS?'突撃くん SVS版':'❄️ 突撃くん 霜竜版';
  document.getElementById('hdr-sub').textContent=isSVS?'WOS SVS 同時着弾管理':'霜竜 同時着弾管理';

  // タブ設定
  const tabsEl=document.getElementById('tabs');
  if(isSVS){
    tabsEl.innerHTML=`
      <div class="tab ${SVS.tab==='setup'?'active':''}" data-tab="setup">① 事前設定</div>
      <div class="tab ${SVS.tab==='battle'?'active':''}" data-tab="battle">② 当日参戦</div>
      <div class="tab ${SVS.tab==='calc'?'active':''}" data-tab="calc">同着計算</div>

function svsOpenModal(key,face,idx){SVS.selCity={key,face,idx};SVS.modal='city';renderSVSModal();}
function renderSVSModal(){
  let ov=document.getElementById('mov');
  if(!ov){ov=document.createElement('div');ov.id='mov';ov.className='mov';ov.onclick=e=>{if(e.target===ov){SVS.modal=null;ov.remove();}};document.body.appendChild(ov);}
  const{key,face,idx}=SVS.selCity;
  const ms=svsMarchList(face),pms=svsPetMarchList(face);
  const cur=SVS.cityAssign[key];
  ov.innerHTML=`<div class="modal">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">${svsFaceLabel(face)} 都市${idx+1} — 集結主を選択</div>
    <div style="background:var(--bg3);border-radius:var(--radius);padding:12px;margin-bottom:12px;display:flex">
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">通常行軍</div><div style="font-size:36px;font-weight:700;color:var(--accent);line-height:1">${ms[idx]}<span style="font-size:13px">秒</span></div></div>
      <div style="width:1px;background:var(--border)"></div>
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:var(--text3);margin-bottom:2px">ペット行軍</div><div style="font-size:36px;font-weight:700;color:var(--green);line-height:1">${pms[idx]}<span style="font-size:13px">秒</span></div></div>
    </div>
    ${cur?`<button class="btn btn-sm btn-danger" style="margin-bottom:10px" onclick="svsAsgn('${key}',null)">割当解除</button>`:''}
    ${SVS.members.map(m=>{
      const isCur=SVS.cityAssign[key]===m.id;
      const info=svsGetMemberCityInfo(m.id);
      const isOther=info&&info.key!==key;
      return`<div style="display:flex;align-items:center;padding:12px;background:${isCur?'#1a2a3a':'var(--bg3)'};border-radius:var(--radius);margin-bottom:6px;cursor:pointer;border:1px solid ${isCur?'var(--accent)':'var(--border)'}" onclick="svsAsgn('${key}',${m.id})">
        <div style="flex:1"><div style="font-size:14px;font-weight:600">${m.name} ${isCur?'✓':''}</div>
        <div style="font-size:11px;color:${isOther?'var(--orange)':'var(--text3)'}">
          ${isCur?'現在割当中':isOther?`${svsFaceLabel(info.face)} 都市${info.idx+1}から移動`:'未割当'}
        </div></div>
      </div>`;
    }).join('')||'<div class="empty">メンバーを先に登録してください</div>'}
  </div>`;
}
function svsAsgn(key,id){
  if(id){if(SVS.cityAssign[key]===id)delete SVS.cityAssign[key];else{for(const k of Object.keys(SVS.cityAssign)){if(SVS.cityAssign[k]===id)delete SVS.cityAssign[k];}SVS.cityAssign[key]=id;}}
  else delete SVS.cityAssign[key];
  SVS.modal=null;document.getElementById('mov')?.remove();render();
}

  const all=frostCalcHits(ac);
  const teams=[...new Set(ac.map(m=>m.team))].sort();
  el.innerHTML=`
<div class="card">
  <div class="sec">全体同時着弾</div>
  ${all.length?`
  <div style="background:var(--bg3);border-radius:var(--radius);padding:12px;margin-bottom:10px">
    <div style="font-size:11px;color:var(--text3)">基準（最短行軍）</div>
    <div style="font-size:40px;font-weight:700;color:var(--ice);line-height:1">${Math.min(...all.map(r=>r.march))}<span style="font-size:16px">秒</span></div>
  </div>
  ${all.map(r=>{
    const hasPet=FROST.pet[r.id]&&petSt(r.id,FROST.pet,FROST.petStart,FROST.now)!=='dead';
    return`<div style="display:flex;align-items:center;padding:10px;background:var(--bg3);border-radius:var(--radius);margin-bottom:6px;border-left:4px solid ${r.wait===0?'var(--green)':'var(--ice)'}">
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${r.name}</div><div style="font-size:11px;color:var(--text3)">${r.march}秒${hasPet?' 🟢':''}</div></div>
      <div class="chip" data-t="${r.team}" style="margin-right:10px">${r.team}</div>
      <div style="text-align:right">
        <div style="font-size:38px;font-weight:700;line-height:1;color:${r.wait===0?'var(--green)':'var(--text)'}">${r.wait}</div>
        <div style="font-size:11px;color:var(--text3)">秒後</div>
      </div>
    </div>`;
  }).join('')}`:`<div class="empty">行軍時間を入力してください</div>`}
</div>
${all.length&&teams.length>1?`<div class="card">
  <div class="sec">チーム別同時着弾</div>
  ${teams.map(t=>{
    const tr=frostCalcHits(ac.filter(m=>m.team===t));if(!tr.length)return'';
    return`<div class="bsec" style="border-left-color:${tc(t)};margin-bottom:10px">
      <div style="font-size:13px;font-weight:700;color:${tc(t)};margin-bottom:6px">チーム ${t}</div>

  }).join('')}
</div>`:''}`;
}

function renderFrostCopy(el){
  const ac=FROST.members.filter(m=>FROST.active.includes(m.id));
  const all=frostCalcHits(ac);
  const at=all.map(r=>`${r.name} ${r.wait}`).join('\n');
  const teams=[...new Set(ac.map(m=>m.team))].sort();
  const chunks=[];for(let i=0;i<teams.length;i+=2)chunks.push(teams.slice(i,i+2));
  function makeTeamText(tList){
    return tList.map(t=>{const tr=frostCalcHits(ac.filter(m=>m.team===t));if(!tr.length)return null;return tr.map((r,i)=>i===0?`【${t}】${r.name} ${r.wait}`:`${r.name} ${r.wait}`).join('\n');}).filter(Boolean).join('\n');
  }
  el.innerHTML=`
<div class="card"><div class="sec">全員版</div>
  <div class="cpbox" id="cp-all">${at||'(参戦メンバーの行軍時間を入力後に表示)'}</div>
  <button class="btn btn-primary btn-sm" onclick="cp(document.getElementById('cp-all').textContent)">コピー</button>
</div>
${chunks.map((chunk,i)=>`<div class="card" style="margin-top:10px">
  <div class="sec">チーム ${chunk.join('・')}（${i+1}回目）</div>
  <div class="cpbox" id="cp-chunk-${i}">${makeTeamText(chunk)||'(なし)'}</div>
  <button class="btn btn-primary btn-sm" onclick="cp(document.getElementById('cp-chunk-${i}').textContent)">コピー（${i+1}回目）</button>
</div>`).join('')}
${renderWhCard()}`;
  renderWhList();
}

let webhooks=JSON.parse(localStorage.getItem('unified_webhooks')||'[]');
let selectedWh=0;
function saveWh(){localStorage.setItem('unified_webhooks',JSON.stringify(webhooks));}
function addWh(){
  const name=document.getElementById('wh-name')?.value?.trim();
  const url=document.getElementById('wh-url')?.value?.trim();
  if(!name||!url){toast('チャンネル名とURLを入力してください');return;}
  webhooks.push({name,url});saveWh();
  document.getElementById('wh-name').value='';document.getElementById('wh-url').value='';
  renderWhList();
}
function removeWh(i){webhooks.splice(i,1);if(selectedWh>=webhooks.length)selectedWh=0;saveWh();renderWhList();}
function renderWhList(){
  const el=document.getElementById('wh-list');if(!el)return;
  if(!webhooks.length){el.innerHTML='<div style="font-size:12px;color:var(--text3);margin-bottom:8px">↓ チャンネルを登録してください</div>';return;}
  el.innerHTML=`<div class="row" style="margin-bottom:8px">
    <select class="inp fl1" id="wh-select" onchange="selectedWh=this.selectedIndex" style="height:44px;font-size:14px;font-weight:600;">
      ${webhooks.map((w,i)=>`<option value="${i}" ${selectedWh===i?'selected':''}>${w.name}</option>`).join('')}
    </select>
    <button class="btn btn-xs btn-danger" style="width:36px;padding:0;flex-shrink:0" onclick="removeWh(selectedWh)">✕</button>
  </div>`;
}
function renderWhCard(){
  return`<div class="card" style="margin-top:10px"><div class="sec">Discord送信</div>
  <div id="wh-list"></div>
  <div style="background:var(--bg3);border-radius:var(--radius);padding:10px;margin-bottom:8px">
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px">チャンネルを追加</div>
    <div class="row" style="margin-bottom:6px"><input class="inp fl1" id="wh-name" placeholder="チャンネル名" style="height:36px;font-size:13px;"/></div>
    <div class="row"><input class="inp fl1" id="wh-url" placeholder="Webhook URL" style="height:36px;font-size:13px;"/><button class="btn btn-xs btn-success" style="width:60px;flex-shrink:0" onclick="addWh()">追加</button></div>
  </div>
  <button class="btn btn-primary" onclick="sendD()">Discordへ送信</button>
</div>`;
}
function sendD(){
  if(!webhooks.length){toast('チャンネルを登録してください');return;}
  const url=webhooks[selectedWh]?.url;if(!url)return;
  const isSVS=MODE==='svs';
  const ac=(isSVS?SVS:FROST).members.filter(m=>(isSVS?SVS:FROST).active.includes(m.id));
  const all=isSVS?svsCalcHits(ac):frostCalcHits(ac);
  const teams=[...new Set(ac.map(m=>m.team))].sort();
  const txt=teams.map(t=>{
    const tr=isSVS?svsCalcHits(ac.filter(m=>m.team===t)):frostCalcHits(ac.filter(m=>m.team===t));
    if(!tr.length)return null;
    return tr.map((r,i)=>i===0?`**【${t}】**${r.name} ${r.wait}秒後`:`${r.name} ${r.wait}秒後`).join('\n');
  }).filter(Boolean).join('\n');
  const header=isSVS?`**⚔️ SVS同時着弾**\n${svsFactionLabel()}`:'**❄️ 霜竜同時着弾**';
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:`${header}\n\n${txt}`})})
    .then(r=>toast(r.ok?'Discord送信完了！':'送信失敗')).catch(()=>toast('送信エラー'));
}

// SVS
function svsSetSplit(v){if(SVS.split===v)return;SVS.split=v;SVS.faction='blue';SVS.cityAssign={};render();}
function svsSetFaction(v){if(SVS.faction===v)return;SVS.faction=v;SVS.cityAssign={};render();}
function svsSetPA(v){if(SVS.placementA===v)return;SVS.placementA=v;for(const k of Object.keys(SVS.cityAssign)){if(k[0]==='A')delete SVS.cityAssign[k];}render();}
function svsSetPB(v){if(SVS.placementB===v)return;SVS.placementB=v;for(const k of Object.keys(SVS.cityAssign)){if(k[0]==='B')delete SVS.cityAssign[k];}render();}
function svsAddM(){
  const n=document.getElementById('svs-nn')?.value?.trim();
  if(!n){toast('名前を入力してください');return;}
  if(SVS.members.length>=20){toast('最大20名まで登録できます');return;}
  if(SVS.members.find(m=>m.name===n)){toast('同じ名前が既に存在します');return;}
  SVS.members.push({id:Date.now(),name:n,team:'A'});
  document.getElementById('svs-nn').value='';render();
}
function svsRmv(id){SVS.members=SVS.members.filter(m=>m.id!==id);SVS.active=SVS.active.filter(a=>a!==id);for(const k of Object.keys(SVS.cityAssign)){if(SVS.cityAssign[k]===id)delete SVS.cityAssign[k];}render();}
function svsToggleActive(mid){SVS.active.includes(mid)?SVS.active=SVS.active.filter(a=>a!==mid):SVS.active.push(mid);render();}
function svsAllJoin(){SVS.active=[...new Set([...SVS.active,...Object.values(SVS.cityAssign)])];render();}
function svsAllLeave(){SVS.active=[];render();}
function svsTp(id){SVS.pet[id]?(SVS.pet[id]=false,delete SVS.petStart[id]):(SVS.pet[id]=true,SVS.petStart[id]=Date.now());render();}
function svsCTeam(id,t){const m=SVS.members.find(m=>m.id===id);if(m)m.team=t;render();}
function svsSetPetT(id,ts){const[h,mn]=ts.split(':').map(Number),now=new Date(),t=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,mn,0);if(t-now>43200000)t.setDate(t.getDate()-1);SVS.petStart[id]=t.getTime();render();}
function svsSetPetN(id){SVS.petStart[id]=Date.now();render();}

// FROST
function frostAddM(){
  const n=document.getElementById('frost-nn')?.value?.trim();
  if(!n){toast('名前を入力してください');return;}
  if(FROST.members.length>=20){toast('最大20名まで登録できます');return;}
  if(FROST.members.find(m=>m.name===n)){toast('同じ名前が既に存在します');return;}
  FROST.members.push({id:Date.now()+1,name:n,team:'A',march:null,petMarch:null});
  document.getElementById('frost-nn').value='';render();
}
function frostRmv(id){FROST.members=FROST.members.filter(m=>m.id!==id);FROST.active=FROST.active.filter(a=>a!==id);delete FROST.pet[id];render();}
function frostJoin(id){if(!FROST.active.includes(id))FROST.active.push(id);render();}
function frostLv(id){FROST.active=FROST.active.filter(a=>a!==id);render();}
function frostSetMarch(id,key,val){const m=FROST.members.find(m=>m.id===id);if(m)m[key]=val?parseInt(val):null;saveAll();render();}
function frostTp(id){FROST.pet[id]?(FROST.pet[id]=false,delete FROST.petStart[id]):(FROST.pet[id]=true,FROST.petStart[id]=Date.now());render();}
function frostCTeam(id,t){const m=FROST.members.find(m=>m.id===id);if(m)m.team=t;render();}
function frostSetPetT(id,ts){const[h,mn]=ts.split(':').map(Number),now=new Date(),t=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,mn,0);if(t-now>43200000)t.setDate(t.getDate()-1);FROST.petStart[id]=t.getTime();render();}
function frostSetPetN(id){FROST.petStart[id]=Date.now();render();}

// 共通
function addE(){
  const n=document.getElementById('en')?.value?.trim();if(!n){toast('敵名を入力してください');return;}
  const march=parseInt(document.getElementById('em')?.value||'0');
  const pet=document.getElementById('ep')?.checked||false;
  if(MODE==='svs')SVS.enemies.push({name:n,march,pet});
  else FROST.enemies.push({name:n,march,pet});
  render();
}
function rmE(mode,i){if(mode==='svs')SVS.enemies.splice(i,1);else FROST.enemies.splice(i,1);render();}

// ============================================================
// 保存・復元
// ============================================================
function saveAll(){
  try{
    localStorage.setItem('unified_svs',JSON.stringify({
      split:SVS.split,faction:SVS.faction,placementA:SVS.placementA,placementB:SVS.placementB,
      members:SVS.members,cityAssign:SVS.cityAssign,active:SVS.active,
      pet:SVS.pet,petStart:SVS.petStart,enemies:SVS.enemies,
    }));
    localStorage.setItem('unified_frost',JSON.stringify({
      members:FROST.members,active:FROST.active,
      pet:FROST.pet,petStart:FROST.petStart,enemies:FROST.enemies,
    }));
  }catch(e){}
}
function loadAll(){
  try{
    const s=JSON.parse(localStorage.getItem('unified_svs')||'{}');
    if(s.split)SVS.split=s.split;if(s.faction)SVS.faction=s.faction;
    if(s.placementA)SVS.placementA=s.placementA;if(s.placementB)SVS.placementB=s.placementB;
    if(s.members)SVS.members=s.members;if(s.cityAssign)SVS.cityAssign=s.cityAssign;
    if(s.active)SVS.active=s.active;if(s.pet)SVS.pet=s.pet;
    if(s.petStart)SVS.petStart=s.petStart;if(s.enemies)SVS.enemies=s.enemies;
  }catch(e){}
  try{
    const f=JSON.parse(localStorage.getItem('unified_frost')||'{}');
    if(f.members)FROST.members=f.members;if(f.active)FROST.active=f.active;
    if(f.pet)FROST.pet=f.pet;if(f.petStart)FROST.petStart=f.petStart;
    if(f.enemies)FROST.enemies=f.enemies;
  }catch(e){}
}

// ============================================================
// GAS連携（共通メンバーリスト）
// ============================================================
function fetchMembers(){
  fetch(GAS_URL).then(r=>r.json()).then(data=>{
    if(!data.members||!data.members.length)return;
    // SVSメンバー更新
    const oldSVS=SVS.members;
    SVS.members=data.members.map((m,i)=>({
      id:oldSVS.find(o=>o.name===m.name)?.id||(Date.now()+i),
      name:m.name,
      team:oldSVS.find(o=>o.name===m.name)?.team||(m.team||'A'),
    }));
    // FROSTメンバー更新
    const oldFrost=FROST.members;
    FROST.members=data.members.map((m,i)=>({
      id:oldFrost.find(o=>o.name===m.name)?.id||(Date.now()+i+1000),
      name:m.name,
      team:oldFrost.find(o=>o.name===m.name)?.team||(m.team||'A'),
      march:oldFrost.find(o=>o.name===m.name)?.march||null,
      petMarch:oldFrost.find(o=>o.name===m.name)?.petMarch||null,
    }));
    document.getElementById('hdr-sub').textContent=MODE==='svs'?'WOS SVS 同時着弾管理':'霜竜 同時着弾管理';
    saveAll();render();
  }).catch(()=>{});
}

  div.innerHTML=`
    <div style="font-size:24px;font-weight:800;color:${titleColor};margin-bottom:4px;text-shadow:0 0 20px ${glowColor},0 2px 8px rgba(0,0,0,1)">${titleText}</div>
    <div style="font-size:13px;color:#e0eeff;margin-bottom:16px;text-shadow:0 0 10px rgba(0,0,0,1)">パスワードを入力してください</div>
    <input id="pw-input" type="password" placeholder="パスワード"
      style="width:100%;height:50px;background:rgba(6,13,26,0.9);border:1.5px solid ${accentColor};border-radius:10px;color:#e0eeff;font-size:18px;text-align:center;outline:none;margin-bottom:10px;letter-spacing:4px;-webkit-appearance:none;"
      onkeydown="if(event.key==='Enter')startVideo('${mode}')"/>
    <button onclick="startVideo('${mode}')"
      style="width:100%;height:50px;background:${isSVS?'#1f6feb':'#0e8fd4'};border:none;border-radius:10px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;box-shadow:0 0 15px ${glowColor};">
      ${btnText}
    </button>
    <div id="pw-err" style="color:#f85149;font-size:13px;margin-top:10px;min-height:18px;text-shadow:0 0 8px rgba(0,0,0,1)"></div>
    <button onclick="switchMode('${isSVS?'frost':'svs'}')"
      style="width:100%;height:42px;background:rgba(6,13,26,0.75);border:1.5px solid ${switchBorder};border-radius:10px;color:${switchColor};font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;-webkit-appearance:none;touch-action:manipulation;">
      ${switchText}
    </button>
  `;
  document.body.appendChild(div);
  setTimeout(()=>document.getElementById('pw-input')?.focus(),300);
}

function startVideo(mode){
  const val=document.getElementById('pw-input')?.value?.trim();
  if(val!==getPass(mode)){
    const err=document.getElementById('pw-err');
    if(err)err.textContent='パスワードが違います';
    const inp=document.getElementById('pw-input');
    if(inp){inp.style.borderColor='#f85149';setTimeout(()=>{inp.style.borderColor=mode==='svs'?'#2f81f7':'#38b6ff';},1000);inp.value='';inp.focus();}
    return;
  }
  sessionStorage.setItem(`auth_${mode}`,'ok');
  document.getElementById('auth-screen')?.remove();
  document.getElementById('auth-bg')?.remove();

  const introVideo=mode==='svs'?FROST_REPO+'intro.mp4':FROST_REPO+'frost_intro.mp4';
  const vwrap=document.createElement('div');
  vwrap.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:20;';
  const vid=document.createElement('video');
  vid.src=introVideo;
  vid.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
  vid.playsInline=true;vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');vid.muted=false;
  const goMain=()=>{
    vwrap.style.transition='opacity 0.5s';vwrap.style.opacity='0';
    setTimeout(()=>{
      vwrap.remove();
      MODE=mode;
      document.getElementById('app').style.display='flex';
      document.getElementById('app').style.opacity='0';
      document.getElementById('app').style.transition='opacity 0.4s';
      setTimeout(()=>{document.getElementById('app').style.opacity='1';},30);
      render();fetchMembers();
    },500);
  };
  vid.onended=goMain;vid.onerror=goMain;
  vwrap.appendChild(vid);document.body.appendChild(vwrap);
  vid.play().catch(goMain);
}

function switchMode(targetMode){
  document.getElementById('auth-screen')?.remove();
  document.getElementById('auth-bg')?.remove();
  const switchVideo=targetMode==='frost'
    ?FROST_REPO+'switch_to_frost.mp4'
    :FROST_REPO+'switch_to_svs.mp4';
  const vwrap=document.createElement('div');
  vwrap.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:20;';
  const vid=document.createElement('video');
  vid.src=switchVideo;
  vid.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
  vid.playsInline=true;vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');vid.muted=false;
  const goAuth=()=>{
    vwrap.style.transition='opacity 0.4s';vwrap.style.opacity='0';
    setTimeout(()=>{vwrap.remove();showAuthScreen(targetMode);},400);
  };
  vid.onended=goAuth;vid.onerror=goAuth;
  vwrap.appendChild(vid);document.body.appendChild(vwrap);
  vid.play().catch(goAuth);
}

// ============================================================
// 起動
// ============================================================
setInterval(()=>{
  SVS.now=Date.now();FROST.now=Date.now();
  const state=MODE==='svs'?SVS:FROST;
  if(state.members.some(m=>state.active.includes(m.id)&&state.pet[m.id]))render();
},10000);

loadAll();

// 最後にアクセスしたモードから起動
const lastMode=localStorage.getItem('last_mode')||'svs';
if(checkAuth(lastMode)){
  MODE=lastMode;
  document.getElementById('app').style.display='flex';
  render();fetchMembers();
} else {
  showAuthScreen(lastMode);
}
</script>
</body>
</html>
