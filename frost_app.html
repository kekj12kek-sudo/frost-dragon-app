<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>突撃くん</title>
<style>
/* ============ 共通 ============ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{color:#e6edf3;font-family:'Hiragino Kana','Hiragino Sans','Yu Gothic',sans-serif;font-size:14px;overscroll-behavior:none}
body.mode-svs{background:#0d1117}
body.mode-frost{background:#060d1a}

/* SVS カラー */
.svs-mode{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;--border:#30363d;--border2:#484f58;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;--accent:#2f81f7;--accent2:#1f6feb;--green:#3fb950;--red:#f85149;--orange:#e3b341;--purple:#a371f7;--hi:#58a6ff;}
/* 霜竜 カラー */
.frost-mode{--bg:#060d1a;--bg2:#0d1829;--bg3:#142035;--bg4:#1c2e47;--border:#1c3050;--border2:#2a4570;--text:#e0eeff;--text2:#7a9cc0;--text3:#4a6a90;--accent:#38b6ff;--accent2:#0e8fd4;--green:#3fb950;--red:#f85149;--orange:#e3b341;--purple:#a371f7;--hi:#7dd3fc;}

#app{max-width:480px;margin:0 auto;min-height:100vh;display:none;flex-direction:column;background:var(--bg)}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:15px;font-weight:700;color:var(--hi)}
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:50px;padding:10px 4px;text-align:center;font-size:11px;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{flex:1;padding:12px;overflow-y:auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.sec{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.btn{height:48px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:500;width:100%}
.btn:active{filter:brightness(0.82)}
.btn-primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn-success{background:#1a3a1f;border-color:var(--green);color:var(--green)}
.btn-danger{background:#3a1a1a;border-color:var(--red);color:var(--red)}
.btn-sm{height:36px;font-size:13px}
.btn-xs{height:30px;font-size:12px;padding:0 10px}
.inp{width:100%;height:40px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;padding:0 10px;outline:none}
.inp:focus{border-color:var(--accent)}
.inp-num{width:80px;height:36px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:15px;font-weight:700;text-align:center;padding:0 6px;outline:none;-webkit-appearance:none;}
.inp-num:focus{border-color:var(--accent)}
select.inp{cursor:pointer}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.p-off{background:#21262d;color:var(--text2)}.p-on{background:#1a3a1f;color:var(--green)}
.p-warn{background:#3a2a0a;color:var(--orange)}.p-low{background:#3a1a1a;color:var(--red)}
.p-dead{background:#21262d;color:var(--text3)}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg4);color:var(--text2)}
.chip[data-t="A"]{background:#1a2a3a;color:#58a6ff}.chip[data-t="B"]{background:#1a3a1a;color:var(--green)}
.chip[data-t="C"]{background:#3a2a0a;color:var(--orange)}.chip[data-t="D"]{background:#3a1a1a;color:var(--red)}
.chip[data-t="E"]{background:#2a1a3a;color:var(--purple)}
.chip[data-t="未"]{background:#21262d;color:var(--text3)}
.ptoggle{display:flex;background:var(--bg);border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:10px}
.pbtn{flex:1;padding:10px 8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);line-height:1.4}
.pbtn.on{background:var(--accent2);color:#fff}
.seg2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.sbtn{padding:10px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);border-radius:8px;border:1px solid var(--border2);background:var(--bg3)}
.sbtn.on-blue{background:#1a2a3a;border-color:var(--accent);color:var(--accent)}
.empty{text-align:center;padding:24px;color:var(--text3);font-size:13px}
.cpbox{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px;font-family:monospace;font-size:13px;white-space:pre;overflow-x:auto;color:var(--text);margin-bottom:8px;line-height:1.8}
.tgl{position:relative;width:48px;height:26px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tsl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bg4);border-radius:26px;transition:.2s}
.tsl:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:var(--text2);border-radius:50%;transition:.2s}
input:checked+.tsl{background:var(--green)}
input:checked+.tsl:before{transform:translateX(22px);background:#fff}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.mov-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:12px 12px 0 0;padding:16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;border-top:1px solid var(--border2)}
.row{display:flex;align-items:center;gap:8px}.fl1{flex:1}
.bsec{background:var(--bg3);border-radius:8px;padding:8px 10px;border-left:3px solid var(--purple);margin-bottom:8px}
.er{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border)}
.ptp{background:var(--bg3);border-radius:8px;padding:10px;margin-top:8px;border:1px solid var(--border2)}
.tinp{width:84px;height:36px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:15px;font-weight:700;text-align:center;padding:0 6px;outline:none}
.face-label{font-size:11px;font-weight:700;padding:4px 8px;border-radius:4px;margin-bottom:6px;display:inline-block}
.face1-label{background:#1a2a3a;color:var(--accent)}
.face2-label{background:#2a1a3a;color:var(--purple)}
</style>
</head>
<body class="mode-svs">
<div id="app" class="svs-mode">
  <div class="header">
    <div>
      <div class="header-title" id="hdr-title">突撃くん SVS版</div>
      <div style="font-size:11px;color:var(--text3)" id="hdr-sub">WOS SVS 同時着弾管理</div>
    </div>
    <div style="font-size:11px;text-align:right;color:var(--text2);white-space:pre-line" id="hdr-info"></div>
  </div>
  <div class="tab-bar" id="tabs"></div>
  <div class="content" id="content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 共通定数
// ============================================================
const REPO_SVS='https://kekj12kek-sudo.github.io/svs-app/';
const REPO_FROST='https://kekj12kek-sudo.github.io/frost-dragon-app/';
const GAS_URL='https://script.google.com/macros/s/AKfycbyES7vlaVErWjcK7WAmcM4cHg1s6EL1kQIxsuELXLmf8GbGNLGfnel_Mp-Qg33BKDb8iQ/exec';
const TEAMS=['未','A','B','C','D','E'];

// SVS定数
const M6=[43,39,36,36,39,43],M5=[40,37,36,37,40];
const P6=[37,33,30,30,33,37],P5=[34,31,30,31,34];

// ============================================================
// モード管理
// ============================================================
let MODE='svs'; // 'svs' or 'frost'

function setMode(m){
  MODE=m;
  const app=document.getElementById('app');
  const body=document.body;
  if(m==='svs'){
    app.className='svs-mode';body.className='mode-svs';
    document.getElementById('hdr-title').textContent='突撃くん SVS版';
    document.getElementById('hdr-sub').textContent='WOS SVS 同時着弾管理';
  } else {
    app.className='frost-mode';body.className='mode-frost';
    document.getElementById('hdr-title').textContent='❄️ 突撃くん 霜竜版';
    document.getElementById('hdr-sub').textContent='霜竜 同時着弾管理';
  }
  buildTabs();
  render();
}

function buildTabs(){
  const tabs=document.getElementById('tabs');
  if(MODE==='svs'){
    tabs.innerHTML=`
      <div class="tab active" data-tab="setup">① 事前設定</div>
      <div class="tab" data-tab="battle">② 当日参戦</div>
      <div class="tab" data-tab="calc">同着計算</div>
      <div class="tab" data-tab="copy">コピー</div>
      <div class="tab" data-tab="enemy">敵情報</div>`;
    SS.tab='battle';
  } else {
    tabs.innerHTML=`
      <div class="tab active" data-tab="battle">② 当日参戦</div>
      <div class="tab" data-tab="calc">同着計算</div>
      <div class="tab" data-tab="copy">コピー</div>
      <div class="tab" data-tab="enemy">敵情報</div>`;
    FS.tab='battle';
  }
  document.getElementById('tabs').addEventListener('click',e=>{
    const t=e.target.closest('[data-tab]');
    if(!t)return;
    if(MODE==='svs')SS.tab=t.dataset.tab;
    else FS.tab=t.dataset.tab;
    render();
  },{once:true});
  document.getElementById('tabs').addEventListener('click',e=>{
    const t=e.target.closest('[data-tab]');if(!t)return;
    if(MODE==='svs')SS.tab=t.dataset.tab;
    else FS.tab=t.dataset.tab;
    render();
  });
}

// ============================================================
// SVS STATE
// ============================================================
const SS={
  tab:'battle',split:'lr',faction:'blue',placementA:'6',placementB:'6',
  members:[],cityAssign:{},active:[],pet:{},petStart:{},enemies:[],
  modal:null,selCity:null,now:Date.now(),
  adjust:{},     // {memberId: {march:0, petMarch:0}} 個人調整値
};

// ============================================================
// 霜竜 STATE
// ============================================================
const FS={
  tab:'battle',
  members:[],active:[],pet:{},petStart:{},enemies:[],now:Date.now(),
  baseId:null,  // 基準メンバーID（nullの場合は最短行軍が自動選択）
};

// ============================================================
// 共通ユーティリティ
// ============================================================
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
function cp(txt){navigator.clipboard.writeText(txt).then(()=>toast('コピーしました！')).catch(()=>toast('コピー失敗'));}
function tc(t){return{A:'#58a6ff',B:'#3fb950',C:'#e3b341',D:'#f85149',E:'#a371f7'}[t]||'#2f81f7';}

// ペット共通
function petSt(id,state){
  const pet=state.pet,petStart=state.petStart,now=state.now;
  if(!pet[id])return'off';
  const rem=120-(now-(petStart[id]||now))/60000;
  if(rem<=0)return'dead';if(rem<=10)return'low';if(rem<=30)return'warn';return'on';
}
function petLbl(id,state){
  if(!state.pet[id])return'⚪ 未使用';
  const rem=120-(state.now-(state.petStart[id]||state.now))/60000;
  if(rem<=0)return'⚫ 失効';
  const m=Math.floor(rem),s=Math.floor((rem-m)*60);
  return`${{on:'🟢',warn:'🟡',low:'🔴'}[petSt(id,state)]||'⚪'} ${m}:${String(s).padStart(2,'0')}`;
}
function fmtT(id,state){const t=new Date(state.petStart[id]||Date.now());return`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;}
function fmtE(id,state){const e=new Date((state.petStart[id]||Date.now())+7200000);return`${String(e.getHours()).padStart(2,'0')}:${String(e.getMinutes()).padStart(2,'0')}`;}

// ============================================================
// SVS ロジック
// ============================================================
const FIXED_POS={
  'lr_blue_A_6':[{"x":72.6,"y":23.08},{"x":61.25,"y":33.68},{"x":49.83,"y":44.73},{"x":37.81,"y":56.49},{"x":25.33,"y":68.82},{"x":11.47,"y":81.88}],
  'lr_blue_B_6':[{"x":15.29,"y":31.52},{"x":28.61,"y":41.73},{"x":40.47,"y":51.04},{"x":53.1,"y":60.18},{"x":66.43,"y":70.24},{"x":79.06,"y":80.57}],
  'lr_blue_A_5':[{"x":67.12,"y":28.87},{"x":55.37,"y":39.5},{"x":43.4,"y":50.45},{"x":30.52,"y":62.79},{"x":18.1,"y":74.58}],
  'lr_blue_B_5':[{"x":21.68,"y":36.34},{"x":33.91,"y":46.39},{"x":47.29,"y":55.93},{"x":60.43,"y":65.52},{"x":72.9,"y":75.6}],
  'lr_red_A_6':[{"x":31.04,"y":29.11},{"x":40.94,"y":36.94},{"x":51.2,"y":45.14},{"x":61.32,"y":52.54},{"x":71.9,"y":59.37},{"x":82.71,"y":67.56}],
  'lr_red_B_6':[{"x":81.27,"y":24},{"x":71.07,"y":32.55},{"x":62.62,"y":39.96},{"x":53.11,"y":47.32},{"x":42.68,"y":54.77},{"x":32.71,"y":62.59}],
  'lr_red_A_5':[{"x":34.69,"y":34.05},{"x":46.01,"y":41.34},{"x":55.96,"y":48.62},{"x":66.37,"y":56.13},{"x":78.15,"y":63.64}],
  'lr_red_B_5':[{"x":76.47,"y":28.6},{"x":66.56,"y":36.91},{"x":56.65,"y":43.94},{"x":47.19,"y":51.74},{"x":37.05,"y":59.54}],
  'ud_blue_A_6':[{"x":11.82,"y":80.8},{"x":24.54,"y":68.91},{"x":37.36,"y":56.24},{"x":49.41,"y":44.55},{"x":61.89,"y":33.42},{"x":73.13,"y":22.61}],
  'ud_blue_B_6':[{"x":27.17,"y":20.8},{"x":36.68,"y":30.77},{"x":47.67,"y":39.32},{"x":57.9,"y":48.77},{"x":69.01,"y":58.17},{"x":81.4,"y":68.22}],
  'ud_blue_A_5':[{"x":18.45,"y":75.35},{"x":31.01,"y":62.59},{"x":43.98,"y":50.78},{"x":55.95,"y":39.12},{"x":67.83,"y":29.25}],
  'ud_blue_B_5':[{"x":33.11,"y":24.84},{"x":42.25,"y":35.31},{"x":53.39,"y":44.77},{"x":64.67,"y":53.63},{"x":76.1,"y":64.18}],
  'ud_red_A_6':[{"x":15.71,"y":30.83},{"x":29.1,"y":41.31},{"x":41.23,"y":51.03},{"x":53.51,"y":60.25},{"x":66.22,"y":70.2},{"x":79.07,"y":79.92}],
  'ud_red_B_6':[{"x":32.65,"y":63.41},{"x":43.3,"y":54.97},{"x":53.15,"y":47.03},{"x":61.78,"y":39.65},{"x":71.75,"y":31.82},{"x":81.4,"y":24.24}],
  'ud_red_A_5':[{"x":22.33,"y":36.81},{"x":34.44,"y":46.54},{"x":46.95,"y":56.02},{"x":59.6,"y":65.97},{"x":73.08,"y":75.18}],
  'ud_red_B_5':[{"x":37.21,"y":58.83},{"x":47.27,"y":51.9},{"x":57.04,"y":43.96},{"x":67.18,"y":36.38},{"x":76.32,"y":28.82}],
};

function sCityPos(faceKey){
  const p=faceKey==='A'?SS.placementA:SS.placementB;
  return FIXED_POS[`${SS.split}_${SS.faction}_${faceKey}_${p}`]||[];
}
function sMarchArr(faceKey){return(faceKey==='A'?SS.placementA:SS.placementB)==='6'?M6:M5;}
function sPetArr(faceKey){return(faceKey==='A'?SS.placementA:SS.placementB)==='6'?P6:P5;}
function sCityCount(faceKey){return parseInt(faceKey==='A'?SS.placementA:SS.placementB);}
function sTotalCities(){return sCityCount('A')+sCityCount('B');}
function sGetCityIdx(mid){for(const[k,v] of Object.entries(SS.cityAssign)){if(v===mid)return{face:k[0],idx:parseInt(k.slice(1))-1,key:k};}return null;}
function sGetMarch(mid){
  const info=sGetCityIdx(mid);if(!info)return null;
  const ms=sMarchArr(info.face),pm=sPetArr(info.face);
  const adj=SS.adjust[mid]||{march:0,petMarch:0};
  const hasPet=SS.pet[mid]&&petSt(mid,SS)!=='dead';
  return hasPet?(pm[info.idx]+(adj.petMarch||0)):(ms[info.idx]+(adj.march||0));
}
function sGetBaseMarch(mid){
  const info=sGetCityIdx(mid);if(!info)return null;
  return sMarchArr(info.face)[info.idx];
}
function sGetBasePetMarch(mid){
  const info=sGetCityIdx(mid);if(!info)return null;
  return sPetArr(info.face)[info.idx];
}
function sAdjust(mid,key,delta){
  if(!SS.adjust[mid])SS.adjust[mid]={march:0,petMarch:0};
  SS.adjust[mid][key]=(SS.adjust[mid][key]||0)+delta;
  render();
}
function sFaceLabel(faceKey){
  if(SS.split==='lr'){const side=SS.faction==='blue'?'左':'右';return faceKey==='A'?`${side}上エリア`:`${side}下エリア`;}
  else{const side=SS.faction==='blue'?'上':'下';return faceKey==='A'?`${side}左エリア`:`${side}右エリア`;}
}
function sFactionLabel(){
  if(SS.split==='lr')return SS.faction==='blue'?'左陣営（青）':'右陣営（赤）';
  return SS.faction==='blue'?'上陣営（青）':'下陣営（赤）';
}
function sGetMapImg(faceKey){
  const IMG={
    'lr_blue_A':REPO_SVS+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_54_40.png',
    'lr_blue_B':REPO_SVS+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_54_56.png',
    'lr_red_A':REPO_SVS+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_55_08.png',
    'lr_red_B':REPO_SVS+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_55_12.png',
    'ud_blue_A':REPO_SVS+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_54_40.png',
    'ud_blue_B':REPO_SVS+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2023_48_15.png',
    'ud_red_A':REPO_SVS+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2023_47_59.png',
    'ud_red_B':REPO_SVS+'ChatGPT%20Image%202026%E5%B9%B45%E6%9C%8824%E6%97%A5%2022_55_12.png',
  };
  return IMG[`${SS.split}_${SS.faction}_${faceKey}`]||'';
}
function sCalcHits(mems){
  const wm=mems.map(m=>({...m,march:sGetMarch(m.id)})).filter(m=>m.march!==null);
  if(!wm.length)return[];
  const base=Math.min(...wm.map(m=>m.march));
  return wm.map(m=>{
    const diff=m.march-base;
    return{...m,wait:diff,countLabel:diff>0?String(diff):diff<0?`+${Math.abs(diff)}`:'0'};
  }).sort((a,b)=>b.wait-a.wait);
}

// ============================================================
// 霜竜 ロジック
// ============================================================
function fGetMarch(mid){
  const m=FS.members.find(m=>m.id===mid);if(!m)return null;
  if(FS.pet[mid]&&petSt(mid,FS)!=='dead'&&m.petMarch)return m.petMarch;
  return m.march||null;
}
function fGetBase(wm){
  // FS.baseIdが設定されていればその行軍時間を基準に、なければ最短
  if(FS.baseId){
    const bm=wm.find(m=>m.id===FS.baseId);
    if(bm)return{base:bm.march,baseMember:bm};
  }
  const minMarch=Math.min(...wm.map(m=>m.march));
  const bm=wm.find(m=>m.march===minMarch);
  return{base:minMarch,baseMember:bm};
}
function fCalcHits(mems){
  const wm=mems.map(m=>({...m,march:fGetMarch(m.id)})).filter(m=>m.march!==null&&m.march>0);
  if(!wm.length)return[];
  const{base,baseMember}=fGetBase(wm);
  return wm.map(m=>{
    const diff=m.march-base;
    // diff>0: 基準より長い → 先に出す → 正数カウント表示
    // diff<0: 基準より短い → 後から出す → +N表示
    // diff=0: 基準 → 0
    return{...m,wait:diff,countLabel:diff>0?String(diff):diff<0?`+${Math.abs(diff)}`:'0'};
  }).sort((a,b)=>b.wait-a.wait);
}

let webhooks=JSON.parse(localStorage.getItem('app_webhooks')||'[]');
let selectedWh=0;
function saveWh(){localStorage.setItem('app_webhooks',JSON.stringify(webhooks));}
function addWh(){
  const name=document.getElementById('wh-name')?.value?.trim();
  const url=document.getElementById('wh-url')?.value?.trim();
  if(!name||!url){toast('チャンネル名とURLを入力してください');return;}
  webhooks.push({name,url});saveWh();
  document.getElementById('wh-name').value='';document.getElementById('wh-url').value='';
  renderWhList();
}
function removeWh(i){webhooks.splice(i,1);if(selectedWh>=webhooks.length)selectedWh=0;saveWh();renderWhList();}
function renderWhList(){
  const el=document.getElementById('wh-list');if(!el)return;
  if(!webhooks.length){el.innerHTML='<div style="font-size:12px;color:var(--text3);margin-bottom:8px">↓ チャンネルを登録してください</div>';return;}
  el.innerHTML=`<div class="row" style="margin-bottom:8px">
    <select class="inp fl1" id="wh-select" onchange="selectedWh=this.selectedIndex" style="height:44px;font-size:14px;font-weight:600;">
      ${webhooks.map((w,i)=>`<option value="${i}" ${selectedWh===i?'selected':''}>${w.name}</option>`).join('')}
    </select>
    <button class="btn btn-xs btn-danger" style="width:36px;padding:0;flex-shrink:0" onclick="removeWh(selectedWh)">✕</button>
  </div>`;
}
function renderWhUI(mode){
  return`<div class="card" style="margin-top:10px"><div class="sec">Discord送信</div>
  <div id="wh-list"></div>
  <div style="background:var(--bg3);border-radius:8px;padding:10px;margin-bottom:8px">
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px">チャンネルを追加</div>
    <div class="row" style="margin-bottom:6px"><input class="inp fl1" id="wh-name" placeholder="チャンネル名" style="height:36px;font-size:13px;"/></div>

  </div>

function sendD(mode){
  if(!webhooks.length){toast('チャンネルを登録してください');return;}
  const url=webhooks[selectedWh]?.url;if(!url)return;
  let txt='';
  if(mode==='svs'){
    const ac=SS.members.filter(m=>SS.active.includes(m.id));
    const teams=[...new Set(ac.map(m=>m.team))].sort();
    txt=teams.map(t=>{const tr=sCalcHits(ac.filter(m=>m.team===t));if(!tr.length)return null;return tr.map((r,i)=>i===0?`**【${t}】**${r.name} ${r.wait}秒後`:`${r.name} ${r.wait}秒後`).join('\n');}).filter(Boolean).join('\n');
    fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:`**🎯 SVS同時着弾**\n${sFactionLabel()}\n\n${txt}`})}).then(r=>toast(r.ok?'Discord送信完了！':'送信失敗')).catch(()=>toast('送信エラー'));
  } else {
    const ac=FS.members.filter(m=>FS.active.includes(m.id));
    const teams=[...new Set(ac.map(m=>m.team))].sort();
    txt=teams.map(t=>{const tr=fCalcHits(ac.filter(m=>m.team===t));if(!tr.length)return null;return tr.map((r,i)=>i===0?`**【${t}】**${r.name} ${r.wait}秒後`:`${r.name} ${r.wait}秒後`).join('\n');}).filter(Boolean).join('\n');
    fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:`**❄️ 霜竜同時着弾**\n\n${txt}`})}).then(r=>toast(r.ok?'Discord送信完了！':'送信失敗')).catch(()=>toast('送信エラー'));
  }
}

function sSplit(v){if(SS.split===v)return;SS.split=v;SS.faction='blue';SS.cityAssign={};render();}
function sFaction(v){if(SS.faction===v)return;SS.faction=v;SS.cityAssign={};render();}
function sPA(v){if(SS.placementA===v)return;SS.placementA=v;for(const k of Object.keys(SS.cityAssign)){if(k[0]==='A')delete SS.cityAssign[k];}render();}
function sPB(v){if(SS.placementB===v)return;SS.placementB=v;for(const k of Object.keys(SS.cityAssign)){if(k[0]==='B')delete SS.cityAssign[k];}render();}
function sAddM(){
  const n=document.getElementById('snn')?.value?.trim();
  if(!n){toast('名前を入力してください');return;}
  if(SS.members.length>=20){toast('最大20名まで登録できます');return;}
  if(SS.members.find(m=>m.name===n)){toast('同じ名前が既に存在します');return;}
  SS.members.push({id:Date.now(),name:n,team:'A'});
  document.getElementById('snn').value='';render();
}
function sRmv(id){SS.members=SS.members.filter(m=>m.id!==id);SS.active=SS.active.filter(a=>a!==id);for(const k of Object.keys(SS.cityAssign)){if(SS.cityAssign[k]===id)delete SS.cityAssign[k];}render();}
function sToggleActive(mid){SS.active.includes(mid)?SS.active=SS.active.filter(a=>a!==mid):SS.active.push(mid);render();}
function sAllJoin(){SS.active=[...new Set([...SS.active,...Object.values(SS.cityAssign)])];render();}
function sAllLeave(){SS.active=[];render();}
function sTp(id){SS.pet[id]?(SS.pet[id]=false,delete SS.petStart[id]):(SS.pet[id]=true,SS.petStart[id]=Date.now());render();}
function sCTeam(id,t){const m=SS.members.find(m=>m.id===id);if(m)m.team=t;render();}
function sSpetT(id,ts){const[h,mn]=ts.split(':').map(Number),now=new Date(),t=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,mn,0);if(t-now>43200000)t.setDate(t.getDate()-1);SS.petStart[id]=t.getTime();render();}
function sSpetN(id){SS.petStart[id]=Date.now();render();}
function sAddE(){
  const n=document.getElementById('en')?.value?.trim();if(!n){toast('敵名を入力してください');return;}
  const sel=document.getElementById('em');
  const[idxStr,placement]=sel.value.split('_');const idx=parseInt(idxStr);
  const ms=placement==='6'?M6:M5;const ps=placement==='6'?P6:P5;
  const march=ms[idx],petMarch=ps[idx];
  const pet=document.getElementById('ep')?.checked||false;
  SS.enemies.push({name:n,march,petMarch,pet});render();
}
function sRmE(i){SS.enemies.splice(i,1);render();}

  if(FS.members.length>=20){toast('最大20名まで登録できます');return;}
  if(FS.members.find(m=>m.name===n)){toast('同じ名前が既に存在します');return;}
  FS.members.push({id:Date.now(),name:n,team:'A',march:null,petMarch:null});
  document.getElementById('fnn').value='';render();
}
function fRmv(id){FS.members=FS.members.filter(m=>m.id!==id);FS.active=FS.active.filter(a=>a!==id);delete FS.pet[id];render();}
function fJoin(id){if(!FS.active.includes(id))FS.active.push(id);render();}
function fLv(id){FS.active=FS.active.filter(a=>a!==id);render();}
function fSetMarch(id,key,val){const m=FS.members.find(m=>m.id===id);if(m)m[key]=val?parseInt(val):null;saveAll();render();}
function fTp(id){FS.pet[id]?(FS.pet[id]=false,delete FS.petStart[id]):(FS.pet[id]=true,FS.petStart[id]=Date.now());render();}
function fCTeam(id,t){const m=FS.members.find(m=>m.id===id);if(m)m.team=t;render();}
function fSpetT(id,ts){const[h,mn]=ts.split(':').map(Number),now=new Date(),t=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,mn,0);if(t-now>43200000)t.setDate(t.getDate()-1);FS.petStart[id]=t.getTime();render();}
function fSpetN(id){FS.petStart[id]=Date.now();render();}
function fAddE(){const n=document.getElementById('en')?.value?.trim();if(!n){toast('敵名を入力してください');return;}FS.enemies.push({name:n,march:parseInt(document.getElementById('em')?.value||'0'),pet:document.getElementById('ep')?.checked||false});render();}
function fRmE(i){FS.enemies.splice(i,1);render();}

// ============================================================
// 保存・復元
// ============================================================
function saveAll(){
  try{localStorage.setItem('app_svs',JSON.stringify({
    split:SS.split,faction:SS.faction,placementA:SS.placementA,placementB:SS.placementB,
    members:SS.members,cityAssign:SS.cityAssign,active:SS.active,pet:SS.pet,petStart:SS.petStart,enemies:SS.enemies,adjust:SS.adjust
  }));
  localStorage.setItem('app_frost',JSON.stringify({
    members:FS.members,active:FS.active,pet:FS.pet,petStart:FS.petStart,enemies:FS.enemies
  }));}catch(e){}
}
function loadAll(){
  try{
    const s=JSON.parse(localStorage.getItem('app_svs')||'{}');
    if(s.split)SS.split=s.split;if(s.faction)SS.faction=s.faction;
    if(s.placementA)SS.placementA=s.placementA;if(s.placementB)SS.placementB=s.placementB;
    if(s.members)SS.members=s.members;if(s.cityAssign)SS.cityAssign=s.cityAssign;
    if(s.active)SS.active=s.active;if(s.pet)SS.pet=s.pet;if(s.petStart)SS.petStart=s.petStart;
    if(s.enemies)SS.enemies=s.enemies;if(s.adjust)SS.adjust=s.adjust;
  }catch(e){}
  try{
    const f=JSON.parse(localStorage.getItem('app_frost')||'{}');
    if(f.members)FS.members=f.members;if(f.active)FS.active=f.active;
    if(f.pet)FS.pet=f.pet;if(f.petStart)FS.petStart=f.petStart;if(f.enemies)FS.enemies=f.enemies;
  }catch(e){}
}

// ============================================================
// GAS連携
// ============================================================
function fetchMembers(){
  fetch(GAS_URL).then(r=>r.json()).then(data=>{
    if(!data.members||!data.members.length)return;
    // SVS・霜竜 両方に同じメンバーを反映
    const syncMembers=(state,isFrost)=>{
      const old=state.members;
      state.members=data.members.map((m,i)=>{
        const o=old.find(o=>o.name===m.name);
        const base={id:o?.id||(Date.now()+i),name:m.name,team:o?.team||(m.team||'A')};
        return isFrost?{...base,march:o?.march||null,petMarch:o?.petMarch||null}:base;
      });
    };
    syncMembers(SS,false);syncMembers(FS,true);
    saveAll();render();
  }).catch(()=>{});
}

// ============================================================
// パスワード認証 & モード切り替え
// ============================================================
function getPass(){return'1648';}
function checkAuth(mode){return sessionStorage.getItem(`auth_${mode}`)==='ok';}

function showModeSelect(){
  // mode_select.mp4をループ再生
  const vid=document.createElement('video');
  vid.id='mode-bg-vid';
  vid.src=REPO_FROST+'mode_select.mp4';
  vid.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:28;';
  vid.autoplay=true;vid.loop=true;vid.muted=true;vid.playsInline=true;
  vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');
  document.body.appendChild(vid);
  vid.play().catch(()=>{});
  // 暗幕
  const ov=document.createElement('div');
  ov.id='mode-overlay';
  ov.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.45);z-index:29;';
  document.body.appendChild(ov);
  // UI
  const div=document.createElement('div');
  div.id='mode-select';
  div.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;display:flex;flex-direction:column;align-items:center;gap:20px;width:85%;max-width:300px;';
  div.innerHTML=`
    <div style="font-size:28px;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,1);text-align:center">突撃くん</div>
    <button onclick="showAuth('svs')"
      style="width:100%;height:64px;background:rgba(31,111,235,0.85);border:2px solid #2f81f7;border-radius:14px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;box-shadow:0 4px 20px rgba(47,129,247,0.5);">
      ⚔️ SVS版
    </button>
    <button onclick="showAuth('frost')"
      style="width:100%;height:64px;background:rgba(14,79,122,0.85);border:2px solid #38b6ff;border-radius:14px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;box-shadow:0 4px 20px rgba(56,182,255,0.5);">
      ❄️ 霜竜版
    </button>
  `;
  document.body.appendChild(div);
}

function showAuth(mode){
  // モード選択の動画・暗幕・UIを削除
  document.getElementById('mode-select')?.remove();document.getElementById('mode-bg-vid')?.remove();document.getElementById('mode-overlay')?.remove();
  document.querySelectorAll('video').forEach(v=>{v.pause();v.remove();});
  document.querySelectorAll('div[style*="rgba(0,0,0,0.55)"]').forEach(v=>v.remove());
  const isSvs=mode==='svs';
  const accentColor=isSvs?'#2f81f7':'#38b6ff';
  const titleText=isSvs?'⚔️ 突撃くん SVS版':'❄️ 突撃くん 霜竜版';
  const otherLabel=isSvs?'❄️ 霜竜モードへ':'⚔️ SVSモードへ';
  const switchFn=isSvs?'switchMode(\'frost\')':'switchMode(\'svs\')';

  // ループ動画背景
  const bgVidUrl=isSvs?REPO_FROST+'svs_bg.mp4':REPO_FROST+'frost_bg.mp4';
  const bgVid=document.createElement('video');
  bgVid.id='auth-bg-vid';
  bgVid.src=bgVidUrl;
  bgVid.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:10;';
  bgVid.autoplay=true;bgVid.loop=true;bgVid.muted=true;bgVid.playsInline=true;
  bgVid.setAttribute('playsinline','');bgVid.setAttribute('webkit-playsinline','');
  document.body.appendChild(bgVid);
  bgVid.play().catch(()=>{});
  // 暗幕
  const bg=document.createElement('div');
  bg.id='auth-bg';
  bg.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.4);z-index:11;';
  document.body.appendChild(bg);

  const div=document.createElement('div');
  div.id='auth-screen';
  div.style.cssText='position:fixed;top:52%;left:50%;transform:translate(-50%,-50%);z-index:11;width:82%;max-width:300px;display:flex;flex-direction:column;align-items:center;';
  div.innerHTML=`
    <div style="font-size:22px;font-weight:800;color:${accentColor};margin-bottom:4px;text-shadow:0 0 16px rgba(0,0,0,1)">${titleText}</div>
    <div style="font-size:13px;color:#e6edf3;margin-bottom:16px;text-shadow:0 0 10px rgba(0,0,0,1)">パスワードを入力してください</div>
    <input id="pw-input" type="password" placeholder="パスワード"
      style="width:100%;height:50px;background:rgba(10,14,22,0.92);border:1.5px solid ${accentColor};border-radius:10px;color:#e6edf3;font-size:18px;text-align:center;outline:none;margin-bottom:10px;letter-spacing:4px;-webkit-appearance:none;"
      onkeydown="if(event.key==='Enter')startVideo('${mode}')"/>
    <button onclick="startVideo('${mode}')"
      style="width:100%;height:50px;background:${isSvs?'#1f6feb':'#0e8fd4'};border:none;border-radius:10px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;margin-bottom:14px;">
      突撃！
    </button>
    <div id="pw-err" style="color:#f85149;font-size:13px;min-height:16px;text-shadow:0 0 8px rgba(0,0,0,1);margin-bottom:10px"></div>
    <button onclick="${switchFn}"
      style="width:100%;height:42px;background:rgba(10,14,22,0.75);border:1.5px solid ${isSvs?'#38b6ff':'#2f81f7'};border-radius:10px;color:${isSvs?'#7dd3fc':'#58a6ff'};font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;">
      ${otherLabel}
    </button>
  `;
  document.body.appendChild(div);
  setTimeout(()=>document.getElementById('pw-input')?.focus(),300);
  // 現在のモードを記憶
  window._authMode=mode;
}

function switchMode(toMode){
  document.getElementById('auth-screen')?.remove();
  document.getElementById('auth-bg')?.remove();
  document.getElementById('auth-bg-vid')?.remove();
  // 切り替えエフェクト動画（z-index最前面で黒背景）
  const vwrap=document.createElement('div');
  vwrap.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:50;';
  const vid=document.createElement('video');
  const videoUrl=toMode==='frost'?REPO_FROST+'switch_to_frost.mp4':REPO_FROST+'switch_to_svs.mp4';
  vid.src=videoUrl;
  vid.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
  vid.playsInline=true;vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');
  vid.muted=false;
  const goAuth=()=>{
    // 動画を即座に非表示にしてからshowAuth
    vwrap.remove();
    showAuth(toMode);
  };
  vid.onended=goAuth;vid.onerror=goAuth;
  vwrap.appendChild(vid);document.body.appendChild(vwrap);
  vid.play().catch(goAuth);
}

function startVideo(mode){
  const val=document.getElementById('pw-input')?.value?.trim();
  if(val!==getPass()){
    const err=document.getElementById('pw-err');if(err)err.textContent='パスワードが違います';
    const inp=document.getElementById('pw-input');if(inp){inp.style.borderColor='#f85149';setTimeout(()=>{inp.style.borderColor=mode==='svs'?'#2f81f7':'#38b6ff';},1000);inp.value='';inp.focus();}
    return;
  }
  sessionStorage.setItem(`auth_${mode}`,'ok');
  document.getElementById('auth-screen')?.remove();document.getElementById('auth-bg')?.remove();document.getElementById('auth-bg-vid')?.remove();
  const videoUrl=mode==='svs'?REPO_FROST+'intro.mp4':REPO_FROST+'frost_intro.mp4';
  const vwrap=document.createElement('div');
  vwrap.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:20;';
  const vid=document.createElement('video');
  vid.src=videoUrl;
  vid.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
  vid.playsInline=true;vid.setAttribute('playsinline','');vid.setAttribute('webkit-playsinline','');vid.muted=false;
  const goMain=()=>{
    vwrap.style.transition='opacity 0.5s';vwrap.style.opacity='0';
    setTimeout(()=>{
      vwrap.remove();
      document.getElementById('app').style.display='flex';
      document.getElementById('app').style.opacity='0';
      document.getElementById('app').style.transition='opacity 0.4s';
      setTimeout(()=>{document.getElementById('app').style.opacity='1';},30);
      setMode(mode);fetchMembers();
    },500);
  };
  vid.onended=goMain;vid.onerror=goMain;
  vwrap.appendChild(vid);document.body.appendChild(vwrap);
  vid.play().catch(goMain);
}

// ============================================================
// 初期化
// ============================================================
const _r=render;
window.render=function(){_r();saveAll();};

setInterval(()=>{
  SS.now=Date.now();FS.now=Date.now();
  if(SS.members.some(m=>SS.active.includes(m.id)&&SS.pet[m.id])||FS.members.some(m=>FS.active.includes(m.id)&&FS.pet[m.id]))render();
},10000);

loadAll();

// 前回のセッションがあればそのモードで再開、なければモード選択画面
const lastMode=sessionStorage.getItem('last_mode');
if(lastMode&&checkAuth(lastMode)){
  document.getElementById('app').style.display='flex';
  setMode(lastMode);fetchMembers();
} else {
  showModeSelect();
}

// モード設定時にセッションに記録
const _setMode=setMode;
window.setMode=function(m){sessionStorage.setItem('last_mode',m);_setMode(m);};
</script>
